        layerIds.forEach((layerId) => {
          const id = layerId.trim();
          if (!id) return;
          if (map.getLayer(id)) {
            map.setLayoutProperty(id, "visibility", visibility);
          }
        });
      });
    });

    if (trafficLightsSelectedFidOnlyEl) {
      trafficLightsSelectedFidOnlyEl.addEventListener("change", async () => {
        filterTrafficLightsBySelectedFid = !!trafficLightsSelectedFidOnlyEl.checked;
        if (filterTrafficLightsBySelectedFid) {
          await ensureTrafficLightsLoaded();
        }
        const view = applyTrafficLightFidFilter();
        const statusEl = document.getElementById("status");
        if (filterTrafficLightsBySelectedFid && selectedFid === null) {
          statusEl.textContent = "Traffic-light segment filter enabled. Select a geolink segment to display traffic lights.";
          return;
        }
        if (filterTrafficLightsBySelectedFid) {
          statusEl.textContent = `Traffic-light segment filter enabled for fid=${selectedFid} (${view.shown}/${view.total} shown).`;
          return;
        }
        statusEl.textContent = `Traffic-light segment filter disabled (${view.shown}/${view.total} shown).`;
      });
    }

    async function refreshCountsSummary() {
      try {
        const r = await fetch(`/debug/counts?${currentTimeQuery()}`);
        const d = await r.json();
        const el = document.getElementById("counts");
        if (!d || d.ok !== true) {
          el.textContent = "Counts unavailable";
          return;
        }
        const c = d.counts || {};
        const badge = (label, val, color) => `<span style="display:inline-flex;align-items:center;gap:3px;margin-right:6px"><span style="width:6px;height:6px;border-radius:50%;background:${color};display:inline-block"></span>${label} <b style="color:#e2e8f0">${val}</b></span>`;
        el.innerHTML =
          badge("Flow", c.tomtom_flow ?? 0, "#06b6d4") +
          badge("Incidents", c.tomtom_incidents ?? 0, "#8b5cf6") + "<br/>" +
          badge("Jams", c.waze_jams ?? 0, "#ef4444") +
          badge("Alerts", c.waze_alerts ?? 0, "#3b82f6") + "<br/>" +
          badge("Brussels", c.brussels_counts ?? 0, "#f59e0b") +
          badge("ANPR", c.anpr_counts ?? 0, "#22c55e");
      } catch (_) {
        const el = document.getElementById("counts");
        el.textContent = "Counts unavailable";
      }
    }
    document.getElementById("counts").textContent = "Layer counts load when a data layer is enabled.";

    map.on("error", (ev) => {
      const el = document.getElementById("status");
      const msg = (ev && ev.error && ev.error.message) ? ev.error.message : "Unknown map error";
      el.textContent = "Map error: " + msg;
    });

    map.on("load", async () => {
      bringInteractiveLayersToFront();
      // Sync layer visibility with checkbox state (all unchecked on launch)
      document.querySelectorAll("input[data-layer]").forEach((el) => {
        const visibility = el.checked ? "visible" : "none";
        (el.getAttribute("data-layer") || "").split(",").forEach((layerId) => {
          const id = layerId.trim();
          if (id && map.getLayer(id)) map.setLayoutProperty(id, "visibility", visibility);
        });
      });
    });

    // (Legacy geolink / traffic-light / fid event handlers removed
    //  — corresponding backend endpoints were trimmed for STIB-only build.)

    // STIB stop click → popup with bilingual name + coloured line badges.
    let stibStopPopup = null;
    function clearStibStopPopup() {
      if (stibStopPopup) { stibStopPopup.remove(); stibStopPopup = null; }
    }
    function escapeHtml(s) {
      return String(s == null ? "" : s)
        .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;").replace(/'/g, "&#39;");
    }
    // Fallback colour per mode when route_color is missing in the API payload.
    const STIB_MODE_FALLBACK_COLOR = {
      metro: "#1e40af", tram: "#16a34a", bus: "#ea580c",
      rail: "#6366f1", funicular: "#9333ea", other: "#374151"
    };
    function stibLineBadge(line) {
      const lid = escapeHtml(line.lineid || "?");
      const bg = line.color || STIB_MODE_FALLBACK_COLOR[line.mode] || "#374151";
      const fg = line.text_color || "#FFFFFF";
      return `<span style="display:inline-block;min-width:26px;padding:3px 8px;margin:2px 6px 2px 0;background:${escapeHtml(bg)};color:${escapeHtml(fg)};font-weight:800;border-radius:6px;text-align:center;font-size:13px;font-family:system-ui,sans-serif;box-shadow:0 1px 2px rgba(0,0,0,0.25)">${lid}</span>`;
    }
    function stibLineRow(line) {
      const badge = stibLineBadge(line);
      const dests = Array.isArray(line.destinations) ? line.destinations : [];
      const destsStr = dests.length ? dests.join(" / ") : "";
      return `<div style="display:flex;align-items:center;margin:3px 0">${badge}<span style="color:#1f2937;font-size:12px">${escapeHtml(destsStr)}</span></div>`;
    }
    map.on("click", "stib-stops-circle", async (ev) => {
      const feature = ev && ev.features && ev.features[0];
      if (!feature) return;
      const pointid = feature.properties && feature.properties.pointid;
      if (!pointid) return;
      const [lng, lat] = feature.geometry.coordinates.slice(0, 2);
      clearStibStopPopup();
      stibStopPopup = new maplibregl.Popup({ closeButton: true, closeOnClick: true, maxWidth: "360px", className: "stib-stop-popup" })
        .setLngLat([lng, lat])
        .setHTML('<div style="font:12px/1.4 system-ui,sans-serif;color:#111;background:#fff;padding:8px 10px;border-radius:6px"><b>Loading…</b></div>')
        .addTo(map);
      try {
        const resp = await fetch(`/api/stib/stop/${encodeURIComponent(pointid)}`);
        const data = await resp.json();
        if (!data.ok) throw new Error(data.error || "stop not found");
        const nameFr = data.stop_name_fr || "(no name)";
        const nameNl = data.stop_name_nl || "";
        const lines = Array.isArray(data.lines) ? data.lines : [];
        const linesHtml = lines.length
          ? '<div style="margin-top:8px">' + lines.map(stibLineRow).join("") + '</div>'
          : '<div style="margin-top:8px;color:#6b7280;font-size:12px">No lines registered for this stop.</div>';
        const html = `<div style="font:12px/1.4 system-ui,-apple-system,sans-serif;color:#111827;background:#ffffff;padding:10px 12px;border-radius:6px;min-width:220px"><div style="font-size:15px;font-weight:800;color:#111827">${escapeHtml(nameFr)}</div>${nameNl && nameNl !== nameFr ? `<div style="color:#6b7280;font-size:11px;margin-top:1px">${escapeHtml(nameNl)}</div>` : ""}<div style="color:#9ca3af;font-size:10px;margin-top:2px">ID ${escapeHtml(data.pointid)}</div>${linesHtml}</div>`;
        stibStopPopup.setHTML(html);
      } catch (err) {
        stibStopPopup.setHTML(`<div style="font:12px system-ui,sans-serif;color:#b91c1c;background:#fff;padding:8px 10px;border-radius:6px">Error: ${escapeHtml(err.message || err)}</div>`);
      }
    });
    map.on("mouseenter", "stib-stops-circle", () => { map.getCanvas().style.cursor = "pointer"; });
    map.on("mouseleave", "stib-stops-circle", () => {
      map.getCanvas().style.cursor = "";
      const tt = document.getElementById("stibStopHoverTooltip");
      if (tt) tt.style.display = "none";
      _hoverStopPointid = null;
    });

    /* ── STIB stop hover tooltip (high zoom) ── */
    const _stopHoverCache = {};          // pointid → {name_fr, name_nl, lines:[]}
    let _hoverStopPointid = null;
    const STIB_MODE_LETTER = { metro: "M", tram: "T", bus: "B" };
    const STIB_MODE_BADGE_CLASS = { metro: "metro", tram: "tram", bus: "bus" };

    function _stibModeBadgeHtml(mode) {
      const letter = STIB_MODE_LETTER[mode] || "?";
      const cls = STIB_MODE_BADGE_CLASS[mode] || "bus";
      return `<span class="stib-mode-badge ${cls}">${letter}</span>`;
    }

    function _buildHoverHtml(info) {
      let h = `<div style="font-weight:700;font-size:13px;margin-bottom:4px">${escapeHtml(info.name_fr)}</div>`;
      if (info.name_nl && info.name_nl !== info.name_fr) {
        h += `<div style="color:#6b7280;font-size:10px;margin-bottom:4px">${escapeHtml(info.name_nl)}</div>`;
      }
      if (info.lines && info.lines.length) {
        info.lines.forEach((l) => {
          h += `<div style="display:flex;align-items:center;margin:2px 0">${_stibModeBadgeHtml(l.mode)}${stibLineBadge(l)}<span style="font-size:11px;color:#374151">${escapeHtml((l.destinations || []).join(" / "))}</span></div>`;
        });
      }
      return h;
    }

    map.on("mousemove", "stib-stops-circle", async (ev) => {
      if (map.getZoom() < 14.5) {
        const tt = document.getElementById("stibStopHoverTooltip");
        if (tt) tt.style.display = "none";
        return;
      }
      const feature = ev && ev.features && ev.features[0];
      if (!feature) return;
      const pointid = feature.properties && feature.properties.pointid;
      if (!pointid) return;

      const tt = document.getElementById("stibStopHoverTooltip");
      if (!tt) return;

      // Position tooltip near cursor
      const mapContainer = map.getContainer();
      const rect = mapContainer.getBoundingClientRect();
      let left = ev.originalEvent.clientX - rect.left + 14;
      let top  = ev.originalEvent.clientY - rect.top - 10;
      if (left + 320 > rect.width) left = left - 340;
      if (top + 200 > rect.height) top = Math.max(0, top - 160);
      tt.style.left = left + "px";
      tt.style.top  = top + "px";

      if (_hoverStopPointid === pointid) {
        tt.style.display = "block";
        return;
      }
      _hoverStopPointid = pointid;

      // Check cache
      if (_stopHoverCache[pointid]) {
        tt.innerHTML = _buildHoverHtml(_stopHoverCache[pointid]);
        tt.style.display = "block";
        return;
      }

      tt.innerHTML = `<div style="color:#6b7280">Loading…</div>`;
      tt.style.display = "block";

      try {
        const resp = await fetch(`/api/stib/stop/${encodeURIComponent(pointid)}`);
        const data = await resp.json();
        if (!data.ok) throw new Error("not found");
        const info = {
          name_fr: data.stop_name_fr || "(sans nom)",
          name_nl: data.stop_name_nl || "",
          lines: Array.isArray(data.lines) ? data.lines : [],
        };
        _stopHoverCache[pointid] = info;
        if (_hoverStopPointid === pointid) {
          tt.innerHTML = _buildHoverHtml(info);
          tt.style.display = "block";
        }
      } catch (err) {
        if (_hoverStopPointid === pointid) {
          tt.innerHTML = `<div style="color:#b91c1c">Erreur</div>`;
        }
      }
    });

    // (Background click → clearAllSelections handler removed; STIB-only
    //  build has no fid / traffic-light selection state to clear.)

    document.getElementById("status").textContent = "Ready.";

    /* ──────────────────────────────────────────────────────────────────────
       Transports panel — STIB line filter (segments + stops)
       ─────────────────────────────────────────────────────────────────── */
    const STIB_TP_FALLBACK_COLOR = {
      metro: "#1e40af", tram: "#16a34a", bus: "#ea580c",
      rail: "#6366f1", funicular: "#9333ea", other: "#374151"
    };
    const stibTp = {
      catalog: [],
      selected: new Set(),
      direction: null,          // direction code filter (only applies when exactly 1 line is selected)
      showSegments: false,
      showStops: false,
      showVehicles: false,
      showAlerts: false,
      vehicleSourceAdded: false,
      // Trajectory player state
      trajectories: [],        // [{trip_id, lineid, mode, route_color, route_text_color, samples:[[t_ms,lon,lat],...]}]
      windowStartMs: null,
      windowEndMs: null,
      playheadMs: null,
      playing: false,
      speed: 1,
      rafId: null,
      lastTickWall: null,      // last wall clock ms (performance.now())
      loadingTrajectories: false,
      tripLabelMap: {},        // trip_id → "71_1" daily trip counter labels
    };
    function tpStibTileUrl(layer) {
      const base = window.location.origin.replace(/\/$/, "");
      const parts = [currentTimeQuery()];
      // Always pass lines= so empty selection → empty tile (no fallback to "all").
      parts.push("lines=" + encodeURIComponent(Array.from(stibTp.selected).join(",") || "__none__"));
      return `${base}/tiles/${layer}/{z}/{x}/{y}.pbf?${parts.filter(Boolean).join("&")}`;
    }
    function tpSetLayerVisibility(layerIds, visible) {
      const vis = visible ? "visible" : "none";
      layerIds.forEach((id) => {
        if (map.getLayer(id)) map.setLayoutProperty(id, "visibility", vis);
      });
    }
    function tpEnsureStibLines() {
      ensureTileSource("stib_lines");
      const src = map.getSource("stib_lines");
      if (src) src.setTiles([tpStibTileUrl("stib_lines")]);
    }
    function tpEnsureStibStops() {
      ensureTileSource("stib_stops");
      const src = map.getSource("stib_stops");
      if (src) src.setTiles([tpStibTileUrl("stib_stops")]);
    }
    function tpEnsureVehicleLayer() {
      if (stibTp.vehicleSourceAdded) return;
      if (map.getSource("stib_vehicles")) { stibTp.vehicleSourceAdded = true; return; }
      map.addSource("stib_vehicles", {
        type: "geojson",
        data: { type: "FeatureCollection", features: [] },
      });
      map.addLayer({
        id: "stib-vehicles-halo",
        type: "circle",
        source: "stib_vehicles",
        paint: {
          "circle-radius": ["interpolate", ["linear"], ["zoom"], 10, 9, 15, 16],
          "circle-color": "#000",
          "circle-opacity": 0.35,
          "circle-blur": 0.6,
        },
      });
      map.addLayer({
        id: "stib-vehicles-circle",
        type: "circle",
        source: "stib_vehicles",
        paint: {
          "circle-radius": ["interpolate", ["linear"], ["zoom"], 10, 7, 15, 13],
          "circle-color": [
            "case",
            ["all", ["has", "route_color"], ["!=", ["get", "route_color"], null]],
            ["get", "route_color"],
            ["match", ["get", "mode"],
              "metro", "#1e40af",
              "tram",  "#16a34a",
              "bus",   "#ea580c",
              "#6b7280"
            ]
          ],
          "circle-stroke-color": "#ffffff",
          "circle-stroke-width": 1.5,
        },
      });
      // Layer 1: lineid centré sur le cercle (comme avant)
      map.addLayer({
        id: "stib-vehicles-label",
        type: "symbol",
        source: "stib_vehicles",
        layout: {
          "text-field": ["get", "lineid"],
          "text-size": ["interpolate", ["linear"], ["zoom"], 10, 9, 15, 13],
          "text-font": ["Noto Sans Bold"],
          "text-allow-overlap": true,
          "text-ignore-placement": true,
        },
        paint: {
          "text-color": [
            "case",
            ["all", ["has", "route_text_color"], ["!=", ["get", "route_text_color"], null]],
            ["get", "route_text_color"],
            "#ffffff"
          ],
          "text-halo-color": "rgba(0,0,0,0.35)",
          "text-halo-width": 0.8,
        },
      });
      // Layer 2: trip_label (71_1) au-dessus du cercle, bien visible
      map.addLayer({
        id: "stib-vehicles-trip-label",
        type: "symbol",
        source: "stib_vehicles",
        layout: {
          "text-field": ["get", "trip_label"],
          "text-size": ["interpolate", ["linear"], ["zoom"], 10, 8, 14, 11, 16, 13],
          "text-font": ["Noto Sans Bold"],
          "text-allow-overlap": true,
          "text-ignore-placement": true,
          "text-offset": [0, -2.2],
          "text-anchor": "bottom",
        },
        paint: {
          "text-color": "#f8fafc",
          "text-halo-color": "#0f172a",
          "text-halo-width": 2,
        },
      });
      stibTp.vehicleSourceAdded = true;
      bringInteractiveLayersToFront && bringInteractiveLayersToFront();
    }

    // ── STIB Alerts layer ─────────────────────────────────────────────
    let _stibAlertSourceAdded = false;
    function ensureAlertLayers() {
      if (_stibAlertSourceAdded) return;
      if (!map.loaded()) {
        console.log("[STIB_ALERTS] map not loaded yet, deferring...");
        map.once("idle", () => {
          ensureAlertLayers();
          // Re-apply visibility+fetch if the user has alerts active now.
          if (stibTp.showAlerts && stibTp.selected && stibTp.selected.size > 0) {
            tpSetLayerVisibility(["stib-alerts-pulse", "stib-alerts-circle", "stib-alerts-label"], true);
            refreshStibAlerts();
          }
        });
        return;
      }
      try {
      if (map.getSource("stib_alerts")) { _stibAlertSourceAdded = true; return; }
      map.addSource("stib_alerts", {
        type: "geojson",
        data: { type: "FeatureCollection", features: [] },
      });
      // Outer pulse ring (color by alert_type: slow_speed=orange, proximity=red)
      map.addLayer({
        id: "stib-alerts-pulse",
        type: "circle",
        source: "stib_alerts",
        layout: { visibility: "none" },
        paint: {
          "circle-radius": ["match", ["get", "severity"], "high", 18, "medium", 15, 12],
          "circle-color": ["match", ["get", "alert_type"],
            "slow_speed", "#fb923c",
            "stuck", "#9333ea",
            /* default proximity */ "#ef4444"],
          "circle-opacity": 0.25,
          "circle-blur": 0.8,
        },
      });
      // Main alert circle
      map.addLayer({
        id: "stib-alerts-circle",
        type: "circle",
        source: "stib_alerts",
        layout: { visibility: "none" },
        paint: {
          "circle-radius": ["match", ["get", "severity"], "high", 10, "medium", 8, 6],
          "circle-color": ["match", ["get", "alert_type"],
            "slow_speed", "#fb923c",
            "stuck", "#9333ea",
            "#ef4444"],
          "circle-opacity": 0.9,
          "circle-stroke-width": 2,
          "circle-stroke-color": "#ffffff",
        },
      });
      // Alert icon
      map.addLayer({
        id: "stib-alerts-label",
        type: "symbol",
        source: "stib_alerts",
        layout: {
          visibility: "none",
          "text-field": "!",
          "text-size": 12,
          "text-font": ["Noto Sans Bold"],
          "text-allow-overlap": true,
          "text-ignore-placement": true,
        },
        paint: {
          "text-color": "#ffffff",
        },
      });
      _stibAlertSourceAdded = true;
      console.log("[STIB_ALERTS] layers created");
      } catch(e) { console.error("[STIB_ALERTS] ensureAlertLayers failed:", e); }

      // ── Tooltip on hover ──────────────────────────────────────────
      const alertTt = document.getElementById("stibAlertTooltip");
      map.on("mouseenter", "stib-alerts-circle", () => { map.getCanvas().style.cursor = "pointer"; });
      map.on("mouseleave", "stib-alerts-circle", () => {
        map.getCanvas().style.cursor = "";
        alertTt.style.display = "none";
      });
      map.on("mousemove", "stib-alerts-circle", (e) => {
        if (!e.features || !e.features.length) return;
        const p = e.features[0].properties;
        let details = {};
        try { details = typeof p.details === "string" ? JSON.parse(p.details) : (p.details || {}); } catch(_){}

        const typeLabels = {
          proximity: "Proximite anormale",
          slow_speed: "Vitesse anormalement lente",
          stuck: "Bus bloqué (immobile)",
          stopped: "Bus immobile",
          slow: "Bus lent",
          gap: "Trou de couverture",
          off_route: "Hors trace",
        };
        const bandLabels = {morning_peak:"Pointe matin", daytime:"Journée", evening_peak:"Pointe soir", evening:"Soirée", night:"Nuit"};
        const dayLabels  = {weekday:"Lu/Ma/Je/Ve", wednesday:"Mercredi", school_vacation:"Vacances scol.", saturday:"Samedi", sunday_holiday:"Dim/Férié"};

        let html = '<span class="alert-sev ' + (p.severity || "low") + '">'
          + (p.severity || "low").toUpperCase() + '</span>'
          + ' — ' + (typeLabels[p.alert_type] || p.alert_type)
          + '<br>Ligne <b>' + (p.lineid || "?") + '</b>';

        if (p.alert_type === "proximity") {
          html += '<br>Distance: <b>' + (details.curvilinear_distance_m != null ? details.curvilinear_distance_m : "?") + ' m</b>';
          if (details.expected_spacing_m) {
            html += ' / ' + details.expected_spacing_m + ' m attendu';
          }
          if (details.time_band) {
            const dayStr = details.day_type ? (dayLabels[details.day_type] || details.day_type) + ' · ' : '';
            html += '<br><span class="alert-detail">' + dayStr + (bandLabels[details.time_band] || details.time_band) + '</span>';
          }
          if (p.line_trip_id_a && p.line_trip_id_b) {
            html += '<br>' + p.line_trip_id_a + ' ↔ ' + p.line_trip_id_b;
          }
          if (details.haversine_distance_m) {
            html += '<div class="alert-detail">GPS: ' + details.haversine_distance_m + ' m</div>';
          }
        } else if (p.alert_type === "slow_speed") {
          const obs = details.observed_kmh, plan = details.planned_kmh, ratio = details.ratio;
          html += '<br>Vitesse: <b>' + (obs != null ? obs : "?") + ' km/h</b>'
               + ' / <b>' + (plan != null ? plan : "?") + ' km/h</b> attendu';
          if (ratio != null) {
            const pct = Math.round(ratio * 100);
            html += ' <span class="alert-detail">(' + pct + '%)</span>';
          }
          if (details.time_band) {
            const dayStr = details.day_type ? (dayLabels[details.day_type] || details.day_type) + ' · ' : '';
            html += '<br><span class="alert-detail">' + dayStr + (bandLabels[details.time_band] || details.time_band) + '</span>';
          }
          if (details.stop_a_pointid && details.stop_b_pointid) {
            html += '<div class="alert-detail">Segment ' + details.stop_a_pointid + ' → ' + details.stop_b_pointid + '</div>';
          }
          if (p.line_trip_id_a) {
            html += '<div class="alert-detail">Trip ' + p.line_trip_id_a + '</div>';
          }
        } else if (p.alert_type === "stuck") {
          html += '<br><b>Immobile</b> depuis l\'émission (jitter < ' + (details.jitter_m != null ? details.jitter_m : "?") + ' m)';
          html += '<div class="alert-detail">Fenêtre: ' + (details.window_s || 180) + 's · ' + (details.fresh_samples || "?") + ' samples</div>';
          if (p.line_trip_id_a) {
            html += '<div class="alert-detail">Trip ' + p.line_trip_id_a + '</div>';
          }
        } else if (p.alert_type === "stopped") {
          html += '<div class="alert-detail">Immobile depuis ' + (details.stopped_since_s || "?") + 's</div>';
        } else if (p.alert_type === "slow") {
          html += '<div class="alert-detail">Vitesse: ' + (details.current_speed_kmh || "?") + ' km/h</div>';
        }

        if (p.detected_at) {
          try {
            html += '<div class="alert-detail">' + new Date(p.detected_at).toLocaleTimeString("fr-BE") + '</div>';
          } catch(_){}
        }

        alertTt.innerHTML = html;
        alertTt.style.display = "block";
        alertTt.style.left = (e.point.x + 12) + "px";
        alertTt.style.top  = (e.point.y - 12) + "px";
      });
    }

    // Refresh alerts from API — called periodically
    let _lastAlertFetch = 0;
    let _allAlerts = [];                               // sorted by _det_ms ASC
    const ALERT_DISPLAY_DURATION_MS = 2 * 60 * 1000; // 2 minutes — display window centered on playhead
    let _transportMetricFilter = "all";                // all | proximity | slow_speed

    // Prepare an alert array for fast per-frame lookup: parse timestamps once,
    // sort by detected_at ASC so renderAlertFrame can binary-search the
    // playhead window in O(log N) instead of O(N).
    function _indexAlerts(arr) {
      for (const a of arr) {
        a._det_ms = a.detected_at ? new Date(a.detected_at).getTime() : 0;
        a._resolved_ms = a.resolved_at ? new Date(a.resolved_at).getTime() : null;
      }
      arr.sort((x, y) => x._det_ms - y._det_ms);
      return arr;
    }

    // Lower bound: smallest i such that arr[i]._det_ms >= target (arr.length if none).
    function _lowerBoundDet(arr, target) {
      let lo = 0, hi = arr.length;
      while (lo < hi) {
        const mid = (lo + hi) >>> 1;
        if (arr[mid]._det_ms < target) lo = mid + 1;
        else hi = mid;
      }
      return lo;
    }

    function renderAlertFrame() {
      if (!_stibAlertSourceAdded) return;
      // When vehicles are active, follow the animation playhead; otherwise
      // fall back to "now" so live alerts show without requiring Vehicles on.
      const ph = stibTp.playheadMs != null ? stibTp.playheadMs : Date.now();

      // Candidate window: detected_at ∈ [ph - DISPLAY_DURATION, ph].
      // Binary-search both ends on the sorted array — O(log N) per frame.
      const lo = _lowerBoundDet(_allAlerts, ph - ALERT_DISPLAY_DURATION_MS);
      const hi = _lowerBoundDet(_allAlerts, ph + 1);   // exclusive upper

      const visible = [];
      for (let i = lo; i < hi; i++) {
        const a = _allAlerts[i];
        // Resolved-before-ph alerts have disappeared already: exclude.
        const end = a._resolved_ms != null
          ? Math.min(a._resolved_ms, a._det_ms + ALERT_DISPLAY_DURATION_MS)
          : a._det_ms + ALERT_DISPLAY_DURATION_MS;
        if (end >= ph) {
          if (_transportMetricFilter === "all" || a.alert_type === _transportMetricFilter) {
            visible.push(a);
          }
        }
      }

      const fc = {
        type: "FeatureCollection",
        features: visible.map(a => ({
          type: "Feature",
          geometry: { type: "Point", coordinates: [a.lon, a.lat] },
          properties: a,
        })),
      };
      map.getSource("stib_alerts")?.setData(fc);
    }
    async function refreshStibAlerts() {
      if (!_stibAlertSourceAdded) return;
      // Throttle: at most every 15s
      const now = Date.now();
      if (now - _lastAlertFetch < 15000) return;
      _lastAlertFetch = now;

      try {
        const tq = currentTimeQuery();
        const params = new URLSearchParams(tq);
        // Fetch ALL alerts (not just active) — renderAlertFrame() filters by playhead.
        if (stibTp.selected && stibTp.selected.size > 0) {
          params.set("lines", Array.from(stibTp.selected).join(","));
        }
        const resp = await fetch("/api/stib/alerts?" + params);
        const data = await resp.json();
        if (!data.ok) return;

        // Store, pre-parse timestamps and sort by detected_at for O(log N) lookup.
        _allAlerts = _indexAlerts(
          (data.alerts || []).filter(a => a.lon != null && a.lat != null)
        );
        renderAlertFrame();
      } catch (err) {
        console.warn("[STIB_ALERTS] fetch failed:", err);
      }
    }

    // ── Trajectory player ─────────────────────────────────────────────
    // Pick a sample interval that balances animation smoothness vs payload
    // size based on the currently requested time window.
    function adaptiveSampleInterval() {
      const h = parseFloat(typeof hours === "number" ? hours : (window.hours || 1));
      if (h <= 2)  return "2 seconds";
      if (h <= 8)  return "10 seconds";
      if (h <= 24) return "30 seconds";
      return "60 seconds";
    }

    async function tpFetchTrajectories() {
      if (stibTp.loadingTrajectories) return;
      if (!stibTp.showVehicles || stibTp.selected.size === 0) return;
      stibTp.loadingTrajectories = true;
      const _countEl = document.getElementById("tpVehicleCount");
      if (_countEl) _countEl.textContent = "⏳ loading…";
      try {
        const tq = currentTimeQuery();
        const linesParam = "lines=" + encodeURIComponent(Array.from(stibTp.selected).join(","));
        const dirParam = (stibTp.selected.size === 1 && stibTp.direction)
          ? "direction=" + encodeURIComponent(stibTp.direction)
          : "";
        const sampleParam = "sample=" + encodeURIComponent(adaptiveSampleInterval());
        const qs = [tq, linesParam, dirParam, sampleParam].filter(Boolean).join("&");
        const resp = await fetch("/api/stib/trajectories?" + qs);
        const data = await resp.json();
        const prevPlayhead = stibTp.playheadMs;
        stibTp.trajectories  = Array.isArray(data.trips) ? data.trips : [];
        stibTp.tripLabelMap  = tpComputeTripLabels(stibTp.trajectories);
        stibTp.windowStartMs = data.window_start_ms || null;
        stibTp.windowEndMs   = data.window_end_ms   || null;
        // Pre-fetch (snap-to-shape) every unique shape referenced by the trips.
        await tpEnsureShapesLoaded(stibTp.trajectories);
        // Initial load: start at latest-sample-minus-buffer so buses are
        // visible immediately. On refresh, keep user position clamped to the
        // valid sample range so RT ingestion lag can't leave playhead ahead
        // of the data.
        const latestMs = latestSampleMs(stibTp.trajectories);
        const defaultPh = (latestMs != null) ? latestMs - PLAY_END_BUFFER_MS : null;
        if (prevPlayhead == null) {
          stibTp.playheadMs = defaultPh;
        } else if (defaultPh != null) {
          stibTp.playheadMs = Math.max(stibTp.windowStartMs || 0, Math.min(prevPlayhead, defaultPh));
        }
        tpSyncSliderBounds();
        tpRenderVehicleFrame();
        const countEl = document.getElementById("tpVehicleCount");
        if (countEl) countEl.textContent = stibTp.trajectories.length ? `(${stibTp.trajectories.length})` : "";
      } catch (err) {
        console.error("[transports] trajectories fetch failed:", err);
      } finally {
        stibTp.loadingTrajectories = false;
      }
    }
    // ── Snap-to-shape cache + helpers ─────────────────────────────────
    // shapeCache: shape_id ("stib:71:City") → {coords:[[lon,lat]], cumLen:[m...], totalLen:m}
    const shapeCache = new Map();
    const shapeFetching = new Map(); // shape_id → in-flight Promise

    function _haversine(a, b) {
      const R = 6371000, toRad = (d) => d * Math.PI / 180;
      const dLat = toRad(b[1] - a[1]), dLon = toRad(b[0] - a[0]);
      const lat1 = toRad(a[1]), lat2 = toRad(b[1]);
      const h = Math.sin(dLat/2)**2 + Math.cos(lat1)*Math.cos(lat2)*Math.sin(dLon/2)**2;
      return 2 * R * Math.asin(Math.sqrt(h));
    }
    function _buildShapeIndex(coords) {
      const cumLen = [0];
      for (let i = 1; i < coords.length; i++) {
        cumLen.push(cumLen[i-1] + _haversine(coords[i-1], coords[i]));
      }
      return { coords, cumLen, totalLen: cumLen[cumLen.length-1] };
    }
    function _pointAtFraction(shape, frac) {
      if (!shape || !shape.coords.length) return null;
      const target = Math.max(0, Math.min(1, frac)) * shape.totalLen;
      // Binary search in cumLen for target.
      let lo = 0, hi = shape.cumLen.length - 1;
      while (lo < hi - 1) {
        const mid = (lo + hi) >> 1;
        if (shape.cumLen[mid] <= target) lo = mid; else hi = mid;
      }
      const segLen = shape.cumLen[hi] - shape.cumLen[lo];
      const r = segLen > 0 ? (target - shape.cumLen[lo]) / segLen : 0;
      const a = shape.coords[lo], b = shape.coords[hi];
      return [a[0] + (b[0]-a[0])*r, a[1] + (b[1]-a[1])*r];
    }
    async function _loadShape(shape_id, operator) {
      if (shapeCache.has(shape_id)) return shapeCache.get(shape_id);
      if (shapeFetching.has(shape_id)) return shapeFetching.get(shape_id);
      // shape_id format: "<operator>:<lineid>:<direction>"
      const [op, lineid, direction] = shape_id.split(":");
      const url = `/api/${op}/shape/${encodeURIComponent(lineid)}/${encodeURIComponent(direction)}`;
      const p = fetch(url).then((r) => r.json()).then((data) => {
        if (data && data.ok && data.geometry && data.geometry.coordinates) {
          const idx = _buildShapeIndex(data.geometry.coordinates);
          shapeCache.set(shape_id, idx);
          return idx;
        }
        shapeCache.set(shape_id, null);
        return null;
      }).catch((e) => { shapeCache.set(shape_id, null); return null; });
      shapeFetching.set(shape_id, p);
      return p;
    }
    async function tpEnsureShapesLoaded(trips) {
      const ids = new Set();
      (trips || []).forEach((t) => { if (t.shape_id) ids.add(t.shape_id); });
      await Promise.all(Array.from(ids).map((id) => _loadShape(id)));
    }

    function tpInterpolateTrip(trip, tMs) {
      const samples = trip.samples;
      if (!samples || !samples.length) return null;
      // Boundary clamps.
      if (tMs <= samples[0][0])                       return _samplePoint(trip, samples[0]);
      if (tMs >= samples[samples.length - 1][0])      return _samplePoint(trip, samples[samples.length - 1]);
      // Linear scan to find encompassing pair.
      for (let i = 0; i < samples.length - 1; i++) {
        const a = samples[i], b = samples[i + 1];
        if (tMs >= a[0] && tMs <= b[0]) {
          const span = b[0] - a[0];
          const r = span > 0 ? (tMs - a[0]) / span : 0;
          // Snap-to-shape: interpolate the curvilinear FRACTION on the shape.
          const shape = trip.shape_id ? shapeCache.get(trip.shape_id) : null;
          if (shape && a[3] != null && b[3] != null) {
            const frac = a[3] + (b[3] - a[3]) * r;
            const pt = _pointAtFraction(shape, frac);
            if (pt) return pt;
          }
          // Fallback: straight-line lerp on lon/lat.
          return [a[1] + (b[1] - a[1]) * r, a[2] + (b[2] - a[2]) * r];
        }
      }
      return null;
    }
    function _samplePoint(trip, sample) {
      // sample = [t_ms, lon, lat, frac_or_null]
      const shape = trip.shape_id ? shapeCache.get(trip.shape_id) : null;
      if (shape && sample[3] != null) {
        const pt = _pointAtFraction(shape, sample[3]);
        if (pt) return pt;
      }
      return [sample[1], sample[2]];
    }
    function tpRenderVehicleFrame() {
      const src = map.getSource("stib_vehicles");
      if (!src) return;
      const t = stibTp.playheadMs;
      const features = [];
      if (t != null) {
        for (const trip of stibTp.trajectories) {
          // Skip trips whose samples don't cover this instant.
          if (t < trip.samples[0][0] || t > trip.samples[trip.samples.length - 1][0]) continue;
          const pt = tpInterpolateTrip(trip, t);
          if (!pt) continue;
          features.push({
            type: "Feature",
            geometry: { type: "Point", coordinates: pt },
            properties: {
              trip_id: trip.trip_id,
              lineid: trip.lineid,
              trip_label: ({"metro":"M","tram":"T","bus":"B"}[trip.mode] || "") + (trip.line_trip_id || ((stibTp.tripLabelMap && stibTp.tripLabelMap[trip.trip_id]) || trip.lineid)),
              mode: trip.mode,
              route_color: trip.route_color,
              route_text_color: trip.route_text_color,
            },
          });
        }
      }
      src.setData({ type: "FeatureCollection", features });
      tpUpdateTimestampLabel();
      // Refresh alerts (auto-throttled to every 15s inside the function).
      refreshStibAlerts();
      // Filter displayed alerts by playhead position each frame.
      renderAlertFrame();
    }
    function tpUpdateTimestampLabel() {
      const el = document.getElementById("tpTimestamp");
      if (!el) return;
      if (stibTp.playheadMs == null) { el.textContent = "—"; return; }
      const d = new Date(stibTp.playheadMs);
      const pad = (n) => String(n).padStart(2, "0");
      el.textContent = `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
    }
    function tpSyncSliderBounds() {
      const slider = document.getElementById("tpSlider");
      if (!slider || stibTp.windowStartMs == null || stibTp.windowEndMs == null) return;
      const dur = stibTp.windowEndMs - stibTp.windowStartMs;
      slider.min = 0;
      slider.max = Math.max(1, dur);
      slider.value = stibTp.playheadMs != null ? (stibTp.playheadMs - stibTp.windowStartMs) : dur;
    }
    function tpSyncSliderFromPlayhead() {
      const slider = document.getElementById("tpSlider");
      if (!slider || stibTp.windowStartMs == null) return;
      slider.value = stibTp.playheadMs - stibTp.windowStartMs;
    }
    // Safety buffer: keep playhead this far behind the latest actual sample
    // (NOT behind windowEndMs, which is NOW and may be way ahead due to RT
    // ingestion lag). A small margin ensures all trips still have data to
    // interpolate at the playhead's position.
    const PLAY_END_BUFFER_MS = 5 * 1000;

    function latestSampleMs(trips) {
      let m = 0;
      for (const t of (trips || [])) {
        const s = t.samples;
        if (s && s.length && s[s.length - 1][0] > m) m = s[s.length - 1][0];
      }
      return m || null;
    }

    function tpPlayLoop(nowWall) {
      if (!stibTp.playing) return;
      if (stibTp.lastTickWall != null) {
        const dt = (nowWall - stibTp.lastTickWall) * stibTp.speed;
        const latestMs = latestSampleMs(stibTp.trajectories);
        const maxPh = (latestMs != null) ? (latestMs - PLAY_END_BUFFER_MS) : null;
        stibTp.playheadMs += dt;
        // Cap playhead at the latest actual sample minus a small buffer, so
        // trips still have data to interpolate at the playhead's position.
        if (maxPh != null && stibTp.playheadMs > maxPh) {
          stibTp.playheadMs = maxPh;
        }
        tpRenderVehicleFrame();
        tpSyncSliderFromPlayhead();
      }
      stibTp.lastTickWall = nowWall;
      stibTp.rafId = requestAnimationFrame(tpPlayLoop);
    }
    function tpStartPlayer() {
      if (stibTp.windowStartMs == null || stibTp.windowEndMs == null) return;
      // Rewind to window start if playhead is already at (or past) the cap,
      // otherwise the play loop would advance a frame and immediately re-cap,
      // leaving the user with an invisible progression.
      const _latest = latestSampleMs(stibTp.trajectories);
      const _maxPh = _latest != null ? _latest - PLAY_END_BUFFER_MS : stibTp.windowEndMs;
      if (stibTp.playheadMs == null || stibTp.playheadMs >= _maxPh - 500) {
        stibTp.playheadMs = stibTp.windowStartMs;
      }
      stibTp.playing = true;
      stibTp.lastTickWall = null;
      const btn = document.getElementById("tpPlayBtn");
      if (btn) { btn.textContent = "⏸"; btn.classList.add("playing"); }
      stibTp.rafId = requestAnimationFrame(tpPlayLoop);
      // Auto-refresh trajectories every 15s so the window keeps extending
      // and the bus never runs out of samples during playback.
      if (!stibTp.autoRefreshTimer) {
        stibTp.autoRefreshTimer = setInterval(() => {
          if (stibTp.showVehicles && stibTp.selected.size > 0) tpFetchTrajectories();
        }, 15000);
      }
    }
    function tpPausePlayer() {
      stibTp.playing = false;
      if (stibTp.rafId) { cancelAnimationFrame(stibTp.rafId); stibTp.rafId = null; }
      stibTp.lastTickWall = null;
      const btn = document.getElementById("tpPlayBtn");
      if (btn) { btn.textContent = "▶"; btn.classList.remove("playing"); }
      if (stibTp.autoRefreshTimer) {
        clearInterval(stibTp.autoRefreshTimer);
        stibTp.autoRefreshTimer = null;
      }
    }
    function tpClearVehicleLayer() {
      const src = map.getSource("stib_vehicles");
      if (src) src.setData({ type: "FeatureCollection", features: [] });
      const countEl = document.getElementById("tpVehicleCount");
      if (countEl) countEl.textContent = "";
    }
    function tpShowTemporalUI(show) {
      const el = document.getElementById("tpTemporal");
      if (el) el.style.display = show ? "" : "none";
    }

    function tpApplyToMap() {
      // Rule: empty selection → show NOTHING, regardless of toggles.
      const hasSelection = stibTp.selected.size > 0;
      const showSegs   = hasSelection && stibTp.showSegments;
      const showStops  = hasSelection && stibTp.showStops;
      const showVeh    = hasSelection && stibTp.showVehicles;
      const showAlerts = hasSelection && stibTp.showAlerts;
      if (showSegs) {
        tpEnsureStibLines();
        tpSetLayerVisibility(["stib-lines-casing", "stib-lines-line"], true);
      } else {
        tpSetLayerVisibility(["stib-lines-casing", "stib-lines-line"], false);
      }
      if (showStops) {
        tpEnsureStibStops();
        tpSetLayerVisibility(["stib-stops-circle"], true);
      } else {
        tpSetLayerVisibility(["stib-stops-circle"], false);
      }
      if (showVeh) {
        tpEnsureVehicleLayer();
        tpSetLayerVisibility(["stib-vehicles-halo", "stib-vehicles-circle", "stib-vehicles-label", "stib-vehicles-trip-label"], true);
        tpShowTemporalUI(true);
        tpFetchTrajectories();
      } else {
        tpSetLayerVisibility(["stib-vehicles-halo", "stib-vehicles-circle", "stib-vehicles-label", "stib-vehicles-trip-label"], false);
        tpPausePlayer();
        tpShowTemporalUI(false);
      }
      if (showAlerts) {
        ensureAlertLayers();
        tpSetLayerVisibility(["stib-alerts-pulse", "stib-alerts-circle", "stib-alerts-label"], true);
        refreshStibAlerts();
      } else {
        tpSetLayerVisibility(["stib-alerts-pulse", "stib-alerts-circle", "stib-alerts-label"], false);
      }
      const emph = stibTp.selected.size > 0 && stibTp.selected.size <= 5;
      const w    = emph
        ? ["interpolate", ["linear"], ["zoom"], 9, 2.8, 14, 6.5]
        : ["interpolate", ["linear"], ["zoom"], 9, 1.8, 14, 4.2];
      const wc   = emph
        ? ["interpolate", ["linear"], ["zoom"], 9, 4.5, 14, 9.5]
        : ["interpolate", ["linear"], ["zoom"], 9, 3.0, 14, 6.5];
      if (map.getLayer("stib-lines-line"))   map.setPaintProperty("stib-lines-line",   "line-width", w);
      if (map.getLayer("stib-lines-casing")) map.setPaintProperty("stib-lines-casing", "line-width", wc);
    }
    function tpGroupLines(catalog) {
      const groups = { metro: [], tram: [], bus: [], noctis: [], other: [] };
      catalog.forEach((line) => {
        let g;
        if ((line.lineid || "").toUpperCase().startsWith("N")) g = "noctis";
        else if (line.mode === "metro") g = "metro";
        else if (line.mode === "tram")  g = "tram";
        else if (line.mode === "bus")   g = "bus";
        else g = "other";
        groups[g].push(line);
      });
      return groups;
    }
    function tpRenderLineList() {
      const container = document.getElementById("tpStibLinesList");
      if (!container) return;
      if (!stibTp.catalog.length) {
        container.innerHTML = '<div class="tp-empty">No lines available.</div>';
        return;
      }
      const groups = tpGroupLines(stibTp.catalog);
      const labels = { metro: "Metro", tram: "Tram", bus: "Bus", noctis: "Noctis", other: "Other" };
      const order  = ["metro", "tram", "bus", "noctis", "other"];
      let html = "";
      for (const g of order) {
        const lines = groups[g];
        if (!lines.length) continue;
        html += `<div class="tp-group-title">${labels[g]}</div><div class="tp-chips">`;
        lines.forEach((line) => {
          const lid = escapeHtml(line.lineid || "?");
          const bg  = line.route_color      || STIB_TP_FALLBACK_COLOR[line.mode] || "#374151";
          const fg  = line.route_text_color || "#ffffff";
          const active = stibTp.selected.has(line.lineid) ? " active" : "";
          const title = escapeHtml((line.destinations || []).join(" ↔ ") || line.lineid);
          html += `<span class="tp-chip${active}" data-lineid="${lid}" title="${title}" style="background:${escapeHtml(bg)};color:${escapeHtml(fg)}">${lid}</span>`;
        });
        html += "</div>";
      }
      container.innerHTML = html;
      container.querySelectorAll(".tp-chip").forEach((el) => {
        el.addEventListener("click", () => {
          const lid = el.getAttribute("data-lineid");
          if (stibTp.selected.has(lid)) stibTp.selected.delete(lid);
          else stibTp.selected.add(lid);
          el.classList.toggle("active");
          // Reset the direction filter whenever the selection changes.
          stibTp.direction = null;
          tpRenderDirectionPicker();
          tpApplyToMap();
          tpRenderLegend();
          if (stibTp.showVehicles && stibTp.selected.size > 0) tpFetchTrajectories();
          // Force immediate alert refresh on line change.
          _lastAlertFetch = 0;
          refreshStibAlerts();
        });
      });
    }
    function tpRenderLegend() {
      const el = document.getElementById("tpLegend");
      if (!el) return;
      if (!stibTp.selected.size) {
        el.innerHTML = '<div class="tp-empty">No line selected — showing all.</div>';
        return;
      }
      const byId = Object.fromEntries(stibTp.catalog.map((l) => [l.lineid, l]));
      const rows = [];
      Array.from(stibTp.selected).sort((a, b) => {
        const na = parseInt(a, 10), nb = parseInt(b, 10);
        if (!isNaN(na) && !isNaN(nb)) return na - nb;
        return String(a).localeCompare(String(b));
      }).forEach((lid) => {
        const line = byId[lid];
        if (!line) return;
        const bg = line.route_color      || STIB_TP_FALLBACK_COLOR[line.mode] || "#374151";
        const fg = line.route_text_color || "#ffffff";
        const dest = (line.destinations || []).join(" ↔ ") || "";
        rows.push(
          `<div class="tp-legend-row">
             <span class="chip-mini" style="background:${escapeHtml(bg)};color:${escapeHtml(fg)}">${escapeHtml(lid)}</span>
             <span class="destinations">${escapeHtml(dest)}</span>
           </div>`
        );
      });
      el.innerHTML = rows.join("") || '<div class="tp-empty">No matching line metadata.</div>';
    }
    function tpRenderDirectionPicker() {
      const wrap = document.getElementById("tpDirectionPicker");
      const chipsEl = document.getElementById("tpDirectionChips");
      if (!wrap || !chipsEl) return;
      // Only show when exactly 1 line is selected.
      if (stibTp.selected.size !== 1) {
        wrap.style.display = "none";
        chipsEl.innerHTML = "";
        return;
      }
      const onlyLineId = stibTp.selected.values().next().value;
      const line = stibTp.catalog.find((l) => l.lineid === onlyLineId);
      const dirs = Array.isArray(line && line.directions_detail) ? line.directions_detail : [];
      if (!dirs.length) {
        wrap.style.display = "none";
        chipsEl.innerHTML = "";
        return;
      }
      wrap.style.display = "";
      const bothActive = !stibTp.direction;
      let html = `<span class="tp-dir-chip${bothActive ? " active" : ""}" data-dir="__all__">Both</span>`;
      dirs.forEach((d) => {
        const code = String(d.direction == null ? "" : d.direction);
        const label = d.destination || (code ? ("Direction " + code) : "—");
        const dest = escapeHtml(label);
        const active = (stibTp.direction && String(stibTp.direction) === code) ? " active" : "";
        html += `<span class="tp-dir-chip${active}" data-dir="${escapeHtml(code)}" title="${dest}"><span class="arrow">→</span>${dest}</span>`;
      });
      chipsEl.innerHTML = html;
      chipsEl.querySelectorAll(".tp-dir-chip").forEach((el) => {
        el.addEventListener("click", () => {
          const d = el.getAttribute("data-dir");
          stibTp.direction = (d === "__all__") ? null : d;
          tpRenderDirectionPicker();
          if (stibTp.showVehicles) tpFetchTrajectories();
        });
      });
    }
    async function tpLoadCatalog() {
      try {
        const resp = await fetch("/api/stib/lines");
        const data = await resp.json();
        stibTp.catalog = Array.isArray(data.lines) ? data.lines : [];
      } catch (err) {
        console.error("[transports] failed to load /api/stib/lines:", err);
        stibTp.catalog = [];
      }
      tpRenderLineList();
      tpRenderLegend();
      tpRenderDirectionPicker();
    }
    // Top-left "Transport" checkbox → toggles the whole bottom-left panel
    const transportPanelToggleEl = document.getElementById("transportPanelToggle");
    const transportsPanelVisEl = document.getElementById("transportsPanel");
    transportPanelToggleEl.addEventListener("change", () => {
      const on = transportPanelToggleEl.checked;
      transportsPanelVisEl.style.display = on ? "" : "none";
      if (!on) {
        // Hide everything on the map when the panel is closed
        tpSetLayerVisibility(["stib-lines-casing", "stib-lines-line", "stib-stops-circle", "stib-vehicles-halo", "stib-vehicles-circle", "stib-vehicles-label", "stib-vehicles-trip-label", "stib-alerts-pulse", "stib-alerts-circle", "stib-alerts-label"], false);
        tpPausePlayer();
        tpShowTemporalUI(false);
      } else {
        tpApplyToMap();
      }
    });
    document.getElementById("tpToggleSegments").addEventListener("click", function () {
      stibTp.showSegments = !stibTp.showSegments;
      this.classList.toggle("active", stibTp.showSegments);
      const sl = document.getElementById("tpSliderSegments");
      if (sl) sl.classList.toggle("visible", stibTp.showSegments);
      tpApplyToMap();
    });
    document.getElementById("tpToggleStops").addEventListener("click", function () {
      stibTp.showStops = !stibTp.showStops;
      this.classList.toggle("active", stibTp.showStops);
      const sl = document.getElementById("tpSliderStops");
      if (sl) sl.classList.toggle("visible", stibTp.showStops);
      tpApplyToMap();
    });
    document.getElementById("tpToggleVehicles").addEventListener("click", function () {
      stibTp.showVehicles = !stibTp.showVehicles;
      this.classList.toggle("active", stibTp.showVehicles);
      const sl = document.getElementById("tpSliderVehicles");
      if (sl) sl.classList.toggle("visible", stibTp.showVehicles);
      tpApplyToMap();
    });
    document.getElementById("tpToggleAlerts").addEventListener("click", function () {
      stibTp.showAlerts = !stibTp.showAlerts;
      this.classList.toggle("active", stibTp.showAlerts);
      const sl = document.getElementById("tpSliderAlerts");
      if (sl) sl.classList.toggle("visible", stibTp.showAlerts);
      tpApplyToMap();
    });
    // Play / Pause
    document.getElementById("tpPlayBtn").addEventListener("click", () => {
      if (stibTp.playing) tpPausePlayer();
      else tpStartPlayer();
    });
    // Slider scrubbing
    document.getElementById("tpSlider").addEventListener("input", (ev) => {
      if (stibTp.windowStartMs == null) return;
      tpPausePlayer();
      stibTp.playheadMs = stibTp.windowStartMs + Number(ev.target.value);
      tpRenderVehicleFrame();
    });
    // Speed buttons
    document.querySelectorAll(".tp-speed-btn").forEach((btn) => {
      btn.addEventListener("click", () => {
        stibTp.speed = Number(btn.getAttribute("data-speed")) || 1;
        document.querySelectorAll(".tp-speed-btn").forEach((b) => b.classList.toggle("active", b === btn));
      });
    });
    document.getElementById("tpSelectAll").addEventListener("click", () => {
      stibTp.selected = new Set(stibTp.catalog.map((l) => l.lineid));
      stibTp.direction = null;
      tpRenderLineList();
      tpRenderLegend();
      tpRenderDirectionPicker();
      tpApplyToMap();
      if (stibTp.showVehicles) tpFetchTrajectories();
      _lastAlertFetch = 0; refreshStibAlerts();
    });
    document.getElementById("tpSelectNone").addEventListener("click", () => {
      stibTp.selected.clear();
      stibTp.direction = null;
      tpRenderLineList();
      tpRenderLegend();
      tpRenderDirectionPicker();
      tpApplyToMap();
      _lastAlertFetch = 0; refreshStibAlerts();
    });
    const transportsPanelEl = document.getElementById("transportsPanel");
    const toggleTransportsBtn = document.getElementById("toggleTransportsPanel");
    toggleTransportsBtn.addEventListener("click", () => {
      const collapsed = transportsPanelEl.classList.toggle("collapsed");
      toggleTransportsBtn.textContent = collapsed ? "Expand" : "Reduce";
    });
    // Operator/STIB level navigation
    const tpLevelOperatorsEl = document.getElementById("tpLevelOperators");
    const tpLevelStibEl      = document.getElementById("tpLevelStib");
    function tpShowLevel(name) {
      tpLevelOperatorsEl.style.display = (name === "operators") ? "" : "none";
      tpLevelStibEl.style.display      = (name === "stib")      ? "" : "none";
    }
    document.querySelectorAll(".tp-op-card").forEach((card) => {
      card.addEventListener("click", () => {
        if (card.classList.contains("disabled")) return;
        const op = card.getAttribute("data-operator");
        if (op === "stib") {
          tpShowLevel("stib");
          tpApplyToMap();
        }
      });
    });
    document.getElementById("tpBackBtn").addEventListener("click", () => {
      tpShowLevel("operators");
    });
    if (map.loaded && map.loaded()) tpLoadCatalog();
    else map.on("load", tpLoadCatalog);

    /* ──────────────────────────────────────────────────────────────────────
       Opacity — left panel: icon toggle → inline slider
       ─────────────────────────────────────────────────────────────────── */
    document.querySelectorAll(".opacity-toggle-btn").forEach((btn) => {
      btn.addEventListener("click", (e) => {
        e.stopPropagation();
        const wrap = btn.closest(".layer-row-wrap");
        const sl = wrap && wrap.querySelector(".opacity-slider-inline");
        if (!sl) return;
        const isOpen = sl.classList.toggle("open");
        btn.classList.toggle("open", isOpen);
      });
    });
    document.querySelectorAll(".opacity-slider-inline").forEach((row) => {
      const slider = row.querySelector('input[type="range"]');
      const valEl  = row.querySelector(".opacity-val");
      const layers = (row.dataset.opacityLayers || "").split(",").map(s => s.trim()).filter(Boolean);
      const kind   = row.dataset.opacityType || "circle";
      slider.addEventListener("input", () => {
        const v = Number(slider.value) / 100;
        if (valEl) valEl.textContent = slider.value + "%";
        layers.forEach((lid) => {
          if (!map.getLayer(lid)) return;
          if (kind === "line") {
            map.setPaintProperty(lid, "line-opacity", v);
          } else {
            map.setPaintProperty(lid, "circle-opacity", v);
            try { map.setPaintProperty(lid, "circle-stroke-opacity", v); } catch(e) {}
          }
        });
      });
    });

    /* ──────────────────────────────────────────────────────────────────────
       Opacity — STIB layers (per-toggle slider + global)
       ─────────────────────────────────────────────────────────────────── */
    const _stibOpacity = { global: 1, segments: 1, stops: 1, vehicles: 1, alerts: 1 };

    function _stibEffective(key) {
      return _stibOpacity.global * _stibOpacity[key];
    }

    function _applyStibOpacity() {
      const segO = _stibEffective("segments");
      if (map.getLayer("stib-lines-line"))   map.setPaintProperty("stib-lines-line", "line-opacity", segO);
      if (map.getLayer("stib-lines-casing")) map.setPaintProperty("stib-lines-casing", "line-opacity", segO * 0.35);
      const stO = _stibEffective("stops");
      if (map.getLayer("stib-stops-circle")) {
        map.setPaintProperty("stib-stops-circle", "circle-opacity", stO * 0.95);
        map.setPaintProperty("stib-stops-circle", "circle-stroke-opacity", stO);
      }
      const vO = _stibEffective("vehicles");
      if (map.getLayer("stib-vehicles-halo"))   map.setPaintProperty("stib-vehicles-halo", "circle-opacity", vO * 0.35);
      if (map.getLayer("stib-vehicles-circle")) {
        map.setPaintProperty("stib-vehicles-circle", "circle-opacity", vO);
        map.setPaintProperty("stib-vehicles-circle", "circle-stroke-opacity", vO);
      }
      if (map.getLayer("stib-vehicles-label"))      map.setPaintProperty("stib-vehicles-label", "text-opacity", vO);
      if (map.getLayer("stib-vehicles-trip-label")) map.setPaintProperty("stib-vehicles-trip-label", "text-opacity", vO);
      const aO = _stibEffective("alerts");
      if (map.getLayer("stib-alerts-pulse"))  map.setPaintProperty("stib-alerts-pulse",  "circle-opacity", aO * 0.25);
      if (map.getLayer("stib-alerts-circle")) {
        map.setPaintProperty("stib-alerts-circle", "circle-opacity", aO * 0.9);
        map.setPaintProperty("stib-alerts-circle", "circle-stroke-opacity", aO);
      }
      if (map.getLayer("stib-alerts-label"))  map.setPaintProperty("stib-alerts-label",  "text-opacity", aO);
    }

    function _bindStibSlider(rowId, key) {
      const row = document.getElementById(rowId);
      if (!row) return;
      const slider = row.querySelector('input[type="range"]');
      const valEl  = row.querySelector(".opacity-val");
      slider.addEventListener("input", () => {
        _stibOpacity[key] = Number(slider.value) / 100;
        if (valEl) valEl.textContent = slider.value + "%";
        _applyStibOpacity();
      });
    }
    _bindStibSlider("tpOpacityGlobal",   "global");
    _bindStibSlider("tpSliderSegments",  "segments");
    _bindStibSlider("tpSliderStops",     "stops");
    _bindStibSlider("tpSliderVehicles",  "vehicles");
    _bindStibSlider("tpSliderAlerts",    "alerts");

    /* ──────────────────────────────────────────────────────────────────────
       Trip labels — daily trip counter (e.g. 71_1, 71_2) ordered by start_ts
       ─────────────────────────────────────────────────────────────────── */
    function tpComputeTripLabels(trajectories) {
      // Group trips by (lineid, operational day), sort by start_ts, assign counter.
      // Operational day starts at 03:30 Brussels time, except Noctis (N*) → midnight.
      const OP_DAY_OFFSET_MS = 3.5 * 3600 * 1000; // 3h30 in ms
      function opDayKey(lid, tsMs) {
        // Brussels is UTC+1 or UTC+2 (DST). Approximate with +2 for summer, +1 for winter.
        // Good enough for grouping — server value is authoritative anyway.
        const d = new Date(tsMs);
        const bruMs = tsMs + 2 * 3600 * 1000; // rough Brussels offset
        const isNoctis = lid.toUpperCase().startsWith("N");
        const adjusted = isNoctis ? bruMs : bruMs - OP_DAY_OFFSET_MS;
        const day = new Date(adjusted);
        return lid + "_" + day.getUTCFullYear() + "-" + (day.getUTCMonth()+1) + "-" + day.getUTCDate();
      }
      const groups = {};
      trajectories.forEach((trip) => {
        const lid = trip.lineid || "?";
        const startTs = (trip.samples && trip.samples.length) ? trip.samples[0][0] : 0;
        const key = opDayKey(lid, startTs);
        if (!groups[key]) groups[key] = [];
        groups[key].push({ trip_id: trip.trip_id, startTs, lid });
      });
      const labelMap = {};
      Object.values(groups).forEach((arr) => {
        arr.sort((a, b) => a.startTs - b.startTs);
        arr.forEach((entry, idx) => {
          labelMap[entry.trip_id] = entry.lid + "_" + (idx + 1);
        });
      });
      return labelMap;
    }

  </script>

  <script>
  // ── Search engine ─────────────────────────────────────────────────────────
  (function () {
    const input    = document.getElementById("searchInput");
    const dropdown = document.getElementById("searchDropdown");
    const clearBtn = document.getElementById("searchClear");

    const BADGE = {
      stib_stop:     { cls: "stib",   icon: "A" },
      stib_line:     { cls: "line",   icon: "L" },
    };

    const ZOOM = {
      stib_stop:     17,
      stib_line:     14,
    };

    let _debounce = null;

    function showDropdown(results) {
      dropdown.innerHTML = "";
      if (!results.length) {
        dropdown.innerHTML = '<div id="searchEmpty">Aucun résultat</div>';
        dropdown.style.display = "block";
        return;
      }

      let currentCat = null;
      for (const r of results) {
        if (r.category !== currentCat) {
          currentCat = r.category;
          const h = document.createElement("div");
          h.className = "sr-category";
          h.textContent = currentCat;
          dropdown.appendChild(h);
        }
        const b = BADGE[r.type] || { cls: "camera", icon: "?" };
        const item = document.createElement("div");
        item.className = "sr-item";
        item.innerHTML =
          `<span class="sr-badge ${b.cls}">${b.icon}</span>` +
          `<span class="sr-label">${r.label}</span>` +
          (r.sub ? `<span class="sr-sub">${r.sub}</span>` : "");
        item.addEventListener("mousedown", (e) => {
          e.preventDefault();
          selectResult(r);
        });
        dropdown.appendChild(item);
      }
      dropdown.style.display = "block";
    }

    function hideDropdown() {
      dropdown.style.display = "none";
    }

    function selectResult(r) {
      input.value = r.label;
      clearBtn.style.display = "inline";
      hideDropdown();
      map.flyTo({ center: [r.lon, r.lat], zoom: ZOOM[r.type] || 16, speed: 1.4 });
    }

    async function doSearch(q) {
      if (q.length < 2) { hideDropdown(); return; }
      try {
        const resp = await fetch(`/api/search?q=${encodeURIComponent(q)}`);
        const data = await resp.json();
        if (data.ok) showDropdown(data.results);
      } catch (_) { /* silently ignore network errors */ }
    }

    input.addEventListener("input", () => {
      const q = input.value.trim();
      clearBtn.style.display = q ? "inline" : "none";
      clearTimeout(_debounce);
      if (!q) { hideDropdown(); return; }
      _debounce = setTimeout(() => doSearch(q), 280);
    });

    input.addEventListener("keydown", (e) => {
      if (e.key === "Escape") { hideDropdown(); input.blur(); }
    });

    clearBtn.addEventListener("click", () => {
      input.value = "";
      clearBtn.style.display = "none";
      hideDropdown();
      input.focus();
    });

    document.addEventListener("click", (e) => {
      if (!document.getElementById("searchBox").contains(e.target)) hideDropdown();
    });
  })();
  </script>
