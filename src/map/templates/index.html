<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Brussels Fast Traffic Map</title>
  <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body, #map { height: 100%; width: 100%; margin: 0; padding: 0; }
    body { font-family: "Inter", system-ui, -apple-system, sans-serif; background: #0f172a; color: #e2e8f0; }

    /* Scrollbar styling */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(148,163,184,0.35); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(148,163,184,0.55); }

    /* ── Control panel (left) ── */
    #panel {
      position: absolute; top: 14px; left: 14px; z-index: 3;
      background: rgba(15,23,42,0.82);
      backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(148,163,184,0.18);
      border-radius: 14px;
      padding: 14px 16px; font-size: 13px;
      width: 220px; max-height: 92vh; overflow-y: auto;
      box-shadow: 0 8px 32px rgba(0,0,0,0.35);
    }
    #panel.collapsed { width: 220px; max-height: none; overflow: hidden; }
    #panel.collapsed #panelBody { display: none; }

    #panelHeader {
      display: flex; align-items: center; justify-content: space-between;
      gap: 8px; margin-bottom: 10px;
    }
    #panelHeader b {
      font-size: 15px; font-weight: 700; color: #f1f5f9;
      letter-spacing: -0.01em;
    }

    /* Shared small button style */
    .btn-sm {
      border: 1px solid rgba(148,163,184,0.25);
      background: rgba(51,65,85,0.6);
      color: #cbd5e1;
      border-radius: 8px;
      padding: 4px 10px;
      font-size: 11px; font-weight: 500; font-family: inherit;
      cursor: pointer;
      transition: all 0.15s ease;
    }
    .btn-sm:hover { background: rgba(71,85,105,0.7); color: #f1f5f9; }

    /* ── Stats panel (bottom-right) ── */
    #statsPanel {
      position: absolute; right: 14px; bottom: 14px; z-index: 3;
      width: min(58vw, 960px); max-height: 55vh; overflow: auto;
      background: rgba(15,23,42,0.88);
      backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(148,163,184,0.18);
      border-radius: 14px;
      padding: 14px 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.35);
      min-width: 400px; min-height: 160px;
      resize: both;
    }
    #statsPanel.collapsed { width: 320px; max-height: none; min-height: 0; resize: none; }
    #statsPanel.collapsed #statsBody { display: none; }

    #statsHeader {
      display: flex; align-items: center; justify-content: space-between;
      gap: 8px; margin-bottom: 10px;
    }
    #statsHeader b { font-size: 14px; font-weight: 700; color: #f1f5f9; }

    #trafficLightPanel {
      position: absolute; right: 14px; top: 72px; z-index: 3;
      width: min(48vw, 680px); max-height: 45vh; overflow: auto;
      background: rgba(15,23,42,0.9);
      backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(148,163,184,0.18);
      border-radius: 14px;
      padding: 12px 14px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.35);
      min-width: 360px;
    }
    #trafficLightPanel.hidden { display: none; }
    #trafficLightPanel.collapsed { width: 300px; min-width: 0; max-height: none; }
    #trafficLightPanel.collapsed #trafficLightPanelBody { display: none; }
    #trafficLightPanelHeader {
      display: flex; align-items: center; justify-content: space-between;
      gap: 8px; margin-bottom: 8px;
    }
    #trafficLightPanelHeader b { font-size: 14px; font-weight: 700; color: #f1f5f9; }
    #trafficLightPanel .chartCard canvas { height: 300px; }

    /* ── Transports panel (bottom-left) ── */
    #transportsPanel {
      position: absolute; left: 14px; bottom: 14px; z-index: 3;
      width: 560px; max-height: 45vh; overflow: auto;
      background: rgba(15,23,42,0.88);
      backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(148,163,184,0.18);
      border-radius: 14px;
      padding: 12px 14px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.35);
      font: 12px system-ui, sans-serif; color: #e2e8f0;
    }
    #transportsPanel.collapsed { width: 240px; max-height: none; overflow: hidden; }
    #transportsPanel.collapsed #transportsBody { display: none; }
    /* Global overlay row (level 0, above operators) */
    .tp-global-overlay-row {
      padding: 6px 0 10px;
      margin-bottom: 6px;
      border-bottom: 1px solid rgba(148,163,184,0.15);
    }
    .tp-overlay-toggle {
      display: inline-flex; align-items: center; gap: 8px;
      cursor: pointer; font-size: 12px; color: #cbd5e1;
    }
    .tp-overlay-toggle input[type="checkbox"] { margin: 0; }
    .tp-overlay-dot {
      width: 34px; height: 8px; border-radius: 4px;
      border: 1px solid rgba(255,255,255,0.2);
    }
    /* Alert-type filter overlay floating over the transport chart.
       Three vertically-stacked rows: [checkbox] [color swatch] [label].
       Positioned absolute top-left inside the chartCard (which is already
       position: relative for this kind of overlay). */
    .chart-filter-dots {
      position: absolute;
      top: 10px;
      left: 72px;   /* décalé à droite pour laisser l'axe Y (title + ticks) visible */
      z-index: 2;
      display: flex;
      flex-direction: column;
      gap: 4px;
      background: rgba(15,23,42,0.72);
      border: 1px solid rgba(148,163,184,0.18);
      border-radius: 10px;
      padding: 7px 10px 7px 8px;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      box-shadow: 0 4px 14px rgba(0,0,0,0.28);
      user-select: none;
    }
    .cfd-row {
      display: flex; align-items: center; gap: 8px;
      cursor: pointer;
      padding: 2px 2px;
      border-radius: 5px;
      transition: background 0.12s ease;
    }
    .cfd-row:hover { background: rgba(71,85,105,0.28); }
    .chart-filter-dots input[type="checkbox"] {
      appearance: none; -webkit-appearance: none;
      width: 13px; height: 13px; margin: 0;
      border: 1.5px solid rgba(148,163,184,0.6);
      border-radius: 3px;
      background: rgba(15,23,42,0.6);
      cursor: pointer;
      position: relative;
      transition: all 0.12s ease;
      flex-shrink: 0;
    }
    .chart-filter-dots input[type="checkbox"]:hover { border-color: #cbd5e1; }
    .chart-filter-dots input[type="checkbox"]:checked {
      background: #3b82f6;
      border-color: #3b82f6;
    }
    .chart-filter-dots input[type="checkbox"]:checked::after {
      content: ""; position: absolute;
      left: 3px; top: 0px;
      width: 4px; height: 8px;
      border: solid #fff;
      border-width: 0 2px 2px 0;
      transform: rotate(45deg);
    }
    .cfd-swatch {
      width: 11px; height: 11px; border-radius: 3px;
      flex-shrink: 0;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.1) inset;
    }
    .cfd-proximity { background: #ef4444; }
    .cfd-slow      { background: #fb923c; }
    .cfd-stuck     { background: #9333ea; }
    .cfd-compare-white {
      /* Half-and-half swatch hinting at "same hue, lighter shade":
         left = saturated red, right = pastel red. The ref colour in
         the chart adapts to the active metric (red-300 / orange-300 /
         purple-300), but red is the simplest visual cue for the
         button itself. */
      background: linear-gradient(90deg, #ef4444 50%, #fca5a5 50%);
    }
    .cfd-row.off { opacity: 0.45; }
    .cfd-row.off:hover { opacity: 0.75; }
    .cfd-row.off .cfd-swatch { filter: grayscale(0.6); }
    /* Compare row gets a subtle separator to visually detach it from
       the 3 metric filters. Disabled when not exactly 1 metric is active. */
    .cfd-compare-row {
      margin-top: 5px;
      padding-top: 7px;
      border-top: 1px solid rgba(148,163,184,0.18);
    }
    .cfd-row.disabled {
      opacity: 0.35;
      cursor: not-allowed;
      pointer-events: none;
    }
    .cfd-row.disabled .cfd-label {
      color: #64748b;
    }
    .cfd-label {
      font-size: 11.5px; font-weight: 500;
      color: #cbd5e1;
      letter-spacing: 0.01em;
      white-space: nowrap;
    }
    /* Metric segmented control (All | Proximity | Slow speed) */
    .tp-segmented {
      display: flex; margin: 8px 0 2px 22px;
      background: rgba(15,23,42,0.6);
      border: 1px solid rgba(148,163,184,0.18);
      border-radius: 8px; padding: 3px; gap: 3px;
    }
    .tp-segmented input[type="radio"] { display: none; }
    .tp-seg-pill {
      flex: 1; text-align: center; cursor: pointer;
      font-size: 10.5px; font-weight: 600; color: #94a3b8;
      padding: 5px 8px; border-radius: 6px;
      transition: all 0.15s ease;
      display: inline-flex; align-items: center; justify-content: center; gap: 5px;
      white-space: nowrap;
    }
    .tp-seg-pill:hover { color: #e2e8f0; background: rgba(71,85,105,0.4); }
    .tp-seg-dot {
      width: 8px; height: 8px; border-radius: 50%;
      box-shadow: 0 0 4px currentColor;
    }
    .tp-seg-proximity .tp-seg-dot { background: #ef4444; color: #ef4444; }
    .tp-seg-slow      .tp-seg-dot { background: #fb923c; color: #fb923c; }
    .tp-segmented input[type="radio"]:checked + .tp-seg-all {
      background: #3b82f6; color: #fff;
      box-shadow: 0 0 6px rgba(59,130,246,0.35);
    }
    .tp-segmented input[type="radio"]:checked + .tp-seg-proximity {
      background: #ef4444; color: #fff;
      box-shadow: 0 0 6px rgba(239,68,68,0.35);
    }
    .tp-segmented input[type="radio"]:checked + .tp-seg-proximity .tp-seg-dot {
      background: #fff; color: #fff;
    }
    .tp-segmented input[type="radio"]:checked + .tp-seg-slow {
      background: #fb923c; color: #fff;
      box-shadow: 0 0 6px rgba(251,146,60,0.4);
    }
    .tp-segmented input[type="radio"]:checked + .tp-seg-slow .tp-seg-dot {
      background: #fff; color: #fff;
    }
    /* Operator grid (level 0) */
    .tp-op-grid {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px;
      margin-top: 4px;
    }
    .tp-op-card {
      padding: 14px 8px; border-radius: 10px; text-align: center; cursor: pointer;
      border: 1px solid rgba(148,163,184,0.25);
      background: rgba(30,41,59,0.6);
      transition: all 0.15s ease;
    }
    .tp-op-card:hover:not(.disabled) {
      background: rgba(59,130,246,0.25);
      border-color: #3b82f6;
      transform: translateY(-2px);
    }
    .tp-op-card.disabled { opacity: 0.4; cursor: not-allowed; }
    .tp-op-card .tp-op-name { font-size: 14px; font-weight: 800; color: #f1f5f9; }
    .tp-op-card .tp-op-sub  { font-size: 9px; color: #94a3b8; margin-top: 4px; text-transform: uppercase; letter-spacing: 0.05em; }
    .tp-back-btn {
      background: none; border: none; color: #94a3b8; cursor: pointer;
      font-size: 13px; padding: 2px 6px; margin-right: 6px;
    }
    .tp-back-btn:hover { color: #e2e8f0; }
    .tp-stib-header { display: flex; align-items: center; gap: 4px; margin-bottom: 8px; }
    .tp-stib-header b { font-size: 12px; color: #cbd5e1; }
    #transportsHeader {
      display: flex; align-items: center; justify-content: space-between;
      gap: 8px; margin-bottom: 10px;
    }
    #transportsHeader b { font-size: 14px; font-weight: 700; color: #f1f5f9; }
    .tp-section-title {
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      color: #94a3b8; letter-spacing: 0.05em; margin: 10px 0 6px;
    }
    .tp-toggles { display: flex; gap: 6px; margin-bottom: 10px; }
    .tp-toggles.tp-toggles-grid {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px;
    }
    .tp-toggle {
      flex: 1; padding: 7px 4px; border-radius: 8px;
      border: 1px solid rgba(148,163,184,0.3);
      background: rgba(51,65,85,0.4); color: #cbd5e1;
      cursor: pointer; font-size: 11px; font-weight: 600;
      transition: all 0.15s ease;
      display: inline-flex; align-items: center; justify-content: center; gap: 4px;
      width: 100%; white-space: nowrap; overflow: hidden;
    }
    .tp-toggle .tp-toggle-ico {
      font-size: 10px; opacity: 0.8; display: inline-block; min-width: 12px;
      text-align: center;
    }
    .tp-toggle:hover { background: rgba(71,85,105,0.6); color: #f1f5f9;
                       transform: translateY(-1px); }
    .tp-toggle.active {
      background: #3b82f6; color: #fff; border-color: #3b82f6;
      box-shadow: 0 0 10px rgba(59,130,246,0.35);
    }
    .tp-toggle.active .tp-toggle-ico { opacity: 1; }
    .tp-toggle.tp-toggle-alert.active {
      background: #ef4444; border-color: #ef4444;
      box-shadow: 0 0 10px rgba(239,68,68,0.4);
    }
    .tp-group-title {
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      color: #64748b; letter-spacing: 0.06em;
      margin: 8px 0 4px; display: flex; align-items: center; gap: 6px;
    }
    .tp-group-title::after {
      content: ""; flex: 1; height: 1px; background: rgba(148,163,184,0.15);
    }
    .tp-chips { display: flex; flex-wrap: wrap; gap: 4px; }
    .tp-chip {
      display: inline-block; min-width: 28px;
      padding: 4px 9px; border-radius: 6px;
      font-weight: 800; font-size: 12px; text-align: center;
      cursor: pointer; user-select: none;
      opacity: 0.45; transition: all 0.12s ease;
      border: 2px solid transparent;
      box-shadow: 0 1px 2px rgba(0,0,0,0.25);
    }
    .tp-chip:hover { opacity: 0.85; transform: translateY(-1px); }
    .tp-chip.active {
      opacity: 1;
      border-color: rgba(255,255,255,0.85);
      box-shadow: 0 2px 8px rgba(0,0,0,0.5);
    }
    .tp-direction-picker { margin-top: 6px; }
    .tp-direction-chips { display: flex; flex-wrap: wrap; gap: 4px; }
    .tp-dir-chip {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 4px 10px; border-radius: 6px;
      font-size: 11px; font-weight: 600;
      cursor: pointer; user-select: none;
      background: rgba(30,41,59,0.6); color: #cbd5e1;
      border: 1.5px solid rgba(148,163,184,0.25);
      transition: all 0.12s ease;
      max-width: 100%;
    }
    .tp-dir-chip:hover { background: rgba(51,65,85,0.8); color: #fff; }
    .tp-dir-chip.active {
      background: rgba(59,130,246,0.25);
      border-color: #3b82f6;
      color: #fff;
    }
    .tp-dir-chip .arrow { font-size: 10px; color: #94a3b8; }
    .tp-dir-chip.active .arrow { color: #bfdbfe; }
    .tp-bulk { display: flex; gap: 6px; margin-top: 8px; }
    .tp-bulk button {
      flex: 1; padding: 4px 8px; font-size: 11px; font-weight: 600;
      border: 1px solid rgba(148,163,184,0.25);
      background: rgba(30,41,59,0.6); color: #cbd5e1;
      border-radius: 6px; cursor: pointer;
    }
    .tp-bulk button:hover { background: rgba(51,65,85,0.8); color: #fff; }
    .tp-legend {
      margin-top: 10px; padding-top: 10px;
      border-top: 1px solid rgba(148,163,184,0.15);
      max-height: 120px; overflow: auto;
    }
    .tp-legend-row {
      display: flex; align-items: center; gap: 8px;
      padding: 3px 0; font-size: 11px;
    }
    .tp-legend-row .chip-mini {
      min-width: 26px; padding: 2px 6px; border-radius: 4px;
      font-weight: 800; font-size: 11px; text-align: center;
    }
    .tp-legend-row .destinations {
      color: #94a3b8; flex: 1; overflow: hidden;
      text-overflow: ellipsis; white-space: nowrap;
    }
    .tp-empty { color: #64748b; font-size: 11px; font-style: italic; padding: 8px 0; }

    /* Temporal controller */
    #tpTemporal {
      margin-top: 10px; padding-top: 10px;
      border-top: 1px solid rgba(148,163,184,0.15);
    }
    .tp-tc-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
    .tp-tc-btn {
      width: 28px; height: 24px; border-radius: 6px;
      background: rgba(51,65,85,0.55); color: #e2e8f0;
      border: 1px solid rgba(148,163,184,0.25); cursor: pointer;
      font-size: 11px; line-height: 1; padding: 0;
    }
    .tp-tc-btn:hover { background: rgba(71,85,105,0.8); }
    .tp-tc-btn.playing { background: #3b82f6; border-color: #3b82f6; }
    #tpSlider {
      flex: 1; height: 4px; appearance: none; background: rgba(148,163,184,0.3);
      border-radius: 2px; outline: none; cursor: pointer;
    }
    #tpSlider::-webkit-slider-thumb {
      -webkit-appearance: none; width: 12px; height: 12px;
      border-radius: 50%; background: #3b82f6; cursor: pointer;
    }
    #tpSlider::-moz-range-thumb {
      width: 12px; height: 12px; border: 0;
      border-radius: 50%; background: #3b82f6; cursor: pointer;
    }
    #tpTimestamp {
      font-family: ui-monospace, monospace; font-size: 11px; color: #cbd5e1;
      min-width: 120px; text-align: right;
    }
    .tp-speed-row { font-size: 10px; color: #94a3b8; }
    .tp-speed-btn {
      padding: 2px 8px; border-radius: 4px;
      background: rgba(30,41,59,0.6); color: #cbd5e1;
      border: 1px solid rgba(148,163,184,0.2); cursor: pointer; font-size: 10px;
    }
    .tp-speed-btn.active { background: #3b82f6; color: #fff; border-color: #3b82f6; }

    /* ── Tab bar ── */
    .tab-bar {
      display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px;
    }
    .tab-btn {
      border: 1px solid rgba(148,163,184,0.2);
      background: rgba(51,65,85,0.5);
      color: #94a3b8;
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 12px; font-weight: 500; font-family: inherit;
      cursor: pointer; white-space: nowrap;
      transition: all 0.2s ease;
    }
    .tab-btn:hover { background: rgba(71,85,105,0.6); color: #e2e8f0; }
    .tab-btn.active {
      background: #3b82f6; color: #fff;
      border-color: #3b82f6;
      box-shadow: 0 0 12px rgba(59,130,246,0.3);
    }

    /* ── Chart card ── */
    .chartCard {
      border: 1px solid rgba(148,163,184,0.12);
      border-radius: 12px;
      padding: 12px;
      background: rgba(30,41,59,0.6);
      position: relative;
    }
    .chartCard canvas { width: 100%; height: 340px; }
    .chartCard.hidden { display: none; }
    /* Horizontally-scrollable host for the transport chart so bars can
       keep their natural width when there are many bins. The inner div
       gets a JS-set min-width = labels.length × pxPerBin. */
    .chart-scroll-wrap {
      width: 100%;
      height: 340px;
      overflow-x: auto;
      overflow-y: hidden;
    }
    .chart-scroll-inner {
      height: 100%;
      min-width: 100%;
    }
    .chart-scroll-inner canvas {
      height: 100% !important;
    }
    /* In expanded mode the wrap takes full available height of the card. */
    .chartCard.expanded .chart-scroll-wrap { height: calc(86vh - 68px); }
    /* Subtle scrollbar styling so it doesn't look out of place. */
    .chart-scroll-wrap::-webkit-scrollbar { height: 8px; }
    .chart-scroll-wrap::-webkit-scrollbar-track { background: rgba(15,23,42,0.3); border-radius: 4px; }
    .chart-scroll-wrap::-webkit-scrollbar-thumb { background: rgba(148,163,184,0.35); border-radius: 4px; }
    .chart-scroll-wrap::-webkit-scrollbar-thumb:hover { background: rgba(148,163,184,0.55); }
    .chart-expand-btn {
      position: absolute;
      top: 8px;
      right: 8px;
      z-index: 2;
      border: 1px solid rgba(148,163,184,0.3);
      background: rgba(15,23,42,0.82);
      color: #e2e8f0;
      border-radius: 8px;
      padding: 3px 9px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s ease;
    }
    .chart-expand-btn:hover {
      background: rgba(30,41,59,0.95);
      border-color: rgba(148,163,184,0.5);
    }
    .chartCard.expanded {
      position: fixed;
      top: 5vh;
      left: 5vw;
      width: 90vw;
      height: 86vh;
      z-index: 4100;
      background: rgba(15,23,42,0.97);
      border: 1px solid rgba(148,163,184,0.35);
      box-shadow: 0 20px 50px rgba(0,0,0,0.45);
      padding: 42px 12px 12px 12px;
    }
    .chartCard.expanded canvas {
      height: calc(86vh - 68px) !important;
    }
    #chartExpandBackdrop {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 4090;
      background: rgba(2,6,23,0.6);
      backdrop-filter: blur(2px);
      -webkit-backdrop-filter: blur(2px);
    }
    #chartExpandBackdrop.active { display: block; }

    /* ── Section titles ── */
    .sectionTitle {
      margin-top: 16px; margin-bottom: 4px;
      font-size: 10px; font-weight: 600;
      text-transform: uppercase;
      color: #64748b;
      letter-spacing: 0.06em;
    }
    .sectionTitle::after {
      content: "";
      display: block;
      margin-top: 6px;
      height: 1px;
      background: linear-gradient(to right, rgba(148,163,184,0.2), transparent);
    }

    /* ── Form rows ── */
    .row {
      margin-top: 6px;
      display: flex; align-items: center; gap: 8px;
    }
    label { cursor: pointer; font-size: 13px; color: #cbd5e1; }

    /* Custom checkbox */
    input[type="checkbox"] {
      appearance: none; -webkit-appearance: none;
      width: 16px; height: 16px;
      border: 1.5px solid rgba(148,163,184,0.4);
      border-radius: 4px;
      background: rgba(51,65,85,0.5);
      cursor: pointer;
      position: relative;
      transition: all 0.15s ease;
      flex-shrink: 0;
    }
    input[type="checkbox"]:checked {
      background: #3b82f6; border-color: #3b82f6;
    }
    input[type="checkbox"]:checked::after {
      content: "";
      position: absolute;
      left: 4.5px; top: 1.5px;
      width: 5px; height: 9px;
      border: solid #fff; border-width: 0 2px 2px 0;
      transform: rotate(45deg);
    }
    input[type="checkbox"]:hover { border-color: rgba(148,163,184,0.6); }

    /* Layer color dots */
    .layer-dot {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* Select & number input */
    select, input[type="number"], input[type="datetime-local"] {
      background: rgba(51,65,85,0.6);
      border: 1px solid rgba(148,163,184,0.25);
      color: #e2e8f0;
      border-radius: 8px;
      padding: 5px 8px;
      font-size: 12px; font-family: inherit;
      outline: none;
      transition: border-color 0.15s ease;
    }
    select:focus, input[type="number"]:focus, input[type="datetime-local"]:focus {
      border-color: #3b82f6;
    }
    input[type="number"] { width: 68px; }

    /* Primary button */
    .btn-primary {
      background: #3b82f6;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 6px 16px;
      font-size: 12px; font-weight: 600; font-family: inherit;
      cursor: pointer;
      transition: all 0.15s ease;
    }
    .btn-primary:hover { background: #2563eb; box-shadow: 0 0 12px rgba(59,130,246,0.3); }

    /* ── Info / legend / status ── */
    .legend {
      margin-top: 10px; font-size: 11px; color: #94a3b8;
      border-top: 1px solid rgba(148,163,184,0.12); padding-top: 10px;
    }
    .tiny {
      font-size: 11px; color: #64748b; margin-top: 6px;
    }
    #status {
      font-size: 11px; color: #94a3b8;
      margin-top: 8px; padding: 6px 8px;
      background: rgba(51,65,85,0.35);
      border-radius: 6px;
      min-height: 20px;
      line-height: 1.4;
    }
    #counts {
      font-size: 12px; color: #94a3b8; line-height: 1.6;
    }

    /* Smooth panel transitions */
    #panel, #statsPanel, #trafficLightPanel {
      transition: width 0.2s ease, min-width 0.2s ease;
    }

    /* Dark map controls */
    .maplibregl-ctrl-group {
      background: rgba(15,23,42,0.8) !important;
      border: 1px solid rgba(148,163,184,0.18) !important;
      backdrop-filter: blur(8px);
      border-radius: 10px !important;
      overflow: hidden;
    }
    .maplibregl-ctrl-group button {
      background: transparent !important;
      border-color: rgba(148,163,184,0.15) !important;
    }
    .maplibregl-ctrl-group button:hover {
      background: rgba(51,65,85,0.6) !important;
    }
    .maplibregl-ctrl-group button .maplibregl-ctrl-icon {
      filter: invert(0.8);
    }
    .maplibregl-ctrl-attrib {
      background: rgba(15,23,42,0.6) !important;
      color: #64748b !important;
      font-size: 10px !important;
      backdrop-filter: blur(4px);
    }
    .maplibregl-ctrl-attrib a { color: #94a3b8 !important; }

    /* Map popup override (if any) */
    .maplibregl-popup-content {
      background: rgba(15,23,42,0.9);
      color: #e2e8f0;
      border-radius: 10px;
      border: 1px solid rgba(148,163,184,0.18);
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }

    /* ── STIB stop hover tooltip ── */
    #stibStopHoverTooltip {
      position: absolute; z-index: 10; pointer-events: none;
      background: rgba(255,255,255,0.97); color: #111827;
      font: 12px/1.4 system-ui, -apple-system, sans-serif;
      padding: 8px 10px; border-radius: 8px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.25);
      border: 1px solid rgba(0,0,0,0.08);
      max-width: 320px; display: none;
    }
    .stib-mode-badge {
      display: inline-flex; align-items: center; justify-content: center;
      width: 18px; height: 18px; border-radius: 50%;
      font-size: 11px; font-weight: 800; color: #fff;
      margin-right: 3px; vertical-align: middle; flex-shrink: 0;
    }
    .stib-mode-badge.metro { background: #dc2626; }
    .stib-mode-badge.tram  { background: #dc2626; }
    .stib-mode-badge.bus   { background: #dc2626; }

    /* ── Opacity controls — left panel (icon toggle → inline slider) ── */
    .layer-row-wrap {
      position: relative;
    }
    .layer-row-wrap .row {
      display: flex; align-items: center; justify-content: space-between;
    }
    .opacity-toggle-btn {
      border: none; background: none; cursor: pointer; padding: 2px 4px;
      opacity: 0.45; transition: opacity 0.2s, filter 0.2s;
      font-size: 14px; line-height: 1; flex-shrink: 0;
    }
    .opacity-toggle-btn:hover, .opacity-toggle-btn.open { opacity: 1; }
    .opacity-toggle-btn.open { filter: drop-shadow(0 0 4px var(--accent)); }
    .opacity-slider-inline {
      display: none; align-items: center; gap: 6px;
      margin: 2px 0 4px 24px; padding: 4px 8px;
      background: rgba(30,41,59,0.6); border-radius: 8px;
      border: 1px solid rgba(148,163,184,0.1);
      animation: slideDown 0.15s ease-out;
    }
    .opacity-slider-inline.open { display: flex; }
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-4px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .opacity-slider-inline input[type="range"] {
      flex: 1; height: 3px; cursor: pointer;
      -webkit-appearance: none; appearance: none;
      background: rgba(148,163,184,0.2); border-radius: 2px;
      outline: none;
    }
    .opacity-slider-inline input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%;
      background: var(--accent, #94a3b8);
      box-shadow: 0 0 6px var(--accent, #94a3b8), 0 0 2px rgba(0,0,0,0.4);
      cursor: pointer; transition: box-shadow 0.15s;
    }
    .opacity-slider-inline input[type="range"]::-webkit-slider-thumb:hover {
      box-shadow: 0 0 10px var(--accent, #94a3b8), 0 0 3px rgba(0,0,0,0.5);
    }
    .opacity-slider-inline .opacity-val {
      font-size: 10px; color: #94a3b8; min-width: 30px; text-align: right;
      font-variant-numeric: tabular-nums;
    }

    /* ── STIB opacity — integrated under toggle buttons ── */
    .tp-toggle-wrap {
      display: flex; flex-direction: column; flex: 1; min-width: 0;
    }
    .tp-toggle-slider {
      display: none; align-items: center; gap: 2px;
      padding: 3px 4px 4px; margin-top: -2px;
      background: rgba(30,41,59,0.5); border-radius: 0 0 8px 8px;
      animation: slideDown 0.15s ease-out;
      min-width: 0;
    }
    .tp-toggle-slider.visible { display: flex; }
    .tp-toggle-slider input[type="range"] {
      flex: 1 1 auto; min-width: 0; height: 3px; cursor: pointer;
      -webkit-appearance: none; appearance: none;
      background: rgba(148,163,184,0.2); border-radius: 2px;
    }
    .tp-toggle-slider input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 10px; height: 10px; border-radius: 50%;
      background: #60a5fa;
      box-shadow: 0 0 5px rgba(96,165,250,0.5);
      cursor: pointer;
    }
    .tp-toggle-slider .opacity-val {
      display: none;   /* hidden on narrow grid — thumb position tells the value */
    }
    /* In the single-column panels (non-grid) still show the % label. */
    .tp-toggles:not(.tp-toggles-grid) .tp-toggle-slider .opacity-val {
      display: inline-block;
      font-size: 9px; color: #94a3b8; min-width: 24px; text-align: right;
      font-variant-numeric: tabular-nums;
    }
    /* Global STIB slider — accent style */
    .tp-global-opacity {
      display: flex; align-items: center; gap: 6px;
      padding: 5px 8px; margin: 4px 0 6px;
      background: rgba(30,41,59,0.5); border-radius: 8px;
      border: 1px solid rgba(148,163,184,0.08);
    }
    .tp-global-opacity label {
      font-size: 10px; color: #94a3b8; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.04em; min-width: 42px;
    }
    .tp-global-opacity input[type="range"] {
      flex: 1; height: 3px; cursor: pointer;
      -webkit-appearance: none; appearance: none;
      background: rgba(148,163,184,0.2); border-radius: 2px;
    }
    .tp-global-opacity input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%;
      background: linear-gradient(135deg, #60a5fa, #a78bfa);
      box-shadow: 0 0 8px rgba(96,165,250,0.4);
      cursor: pointer;
    }
    .tp-global-opacity .opacity-val {
      font-size: 10px; color: #94a3b8; min-width: 28px; text-align: right;
      font-variant-numeric: tabular-nums;
    }
    /* ── STIB Alerts ─────────────────────────────────────────────── */
    #stibAlertTooltip {
      position: absolute; z-index: 1200; pointer-events: none;
      background: rgba(15,23,42,0.92); backdrop-filter: blur(8px);
      border: 1px solid rgba(239,68,68,0.5); border-radius: 8px;
      padding: 8px 12px; font-size: 12px; color: #f1f5f9;
      max-width: 280px; display: none; line-height: 1.45;
    }
    #stibAlertTooltip .alert-sev {
      font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;
    }
    #stibAlertTooltip .alert-sev.high   { color: #dc2626; }
    #stibAlertTooltip .alert-sev.medium { color: #f97316; }
    #stibAlertTooltip .alert-sev.low    { color: #eab308; }
    #stibAlertTooltip .alert-detail { color: #94a3b8; margin-top: 4px; }
    @keyframes alertPulse {
      0%, 100% { opacity: 0.85; }
      50%      { opacity: 0.5; }
    }
    /* ── Search box (top center) ── */
    #searchBox {
      position: absolute; top: 14px; left: 50%; transform: translateX(-50%);
      z-index: 10; width: 400px;
    }
    #searchInputWrapper {
      display: flex; align-items: center; gap: 8px;
      background: rgba(15,23,42,0.88);
      backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(148,163,184,0.25);
      border-radius: 10px; padding: 8px 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
      transition: border-color 0.15s;
    }
    #searchInputWrapper:focus-within { border-color: rgba(148,163,184,0.55); }
    #searchIcon { flex-shrink: 0; color: #64748b; }
    #searchInput {
      flex: 1; background: transparent; border: none; outline: none;
      color: #e2e8f0; font-size: 14px; font-family: inherit;
    }
    #searchInput::placeholder { color: #475569; }
    #searchClear {
      flex-shrink: 0; background: none; border: none; cursor: pointer;
      color: #64748b; font-size: 16px; line-height: 1; padding: 0 2px;
    }
    #searchClear:hover { color: #e2e8f0; }
    #searchDropdown {
      margin-top: 5px;
      background: rgba(15,23,42,0.95);
      backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(148,163,184,0.18);
      border-radius: 10px; overflow: hidden;
      max-height: 380px; overflow-y: auto;
      box-shadow: 0 8px 32px rgba(0,0,0,0.45);
    }
    .sr-category {
      padding: 7px 14px 4px;
      font-size: 10px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.08em;
      color: #475569; border-top: 1px solid rgba(148,163,184,0.08);
    }
    .sr-category:first-child { border-top: none; }
    .sr-item {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 14px; cursor: pointer;
    }
    .sr-item:hover { background: rgba(148,163,184,0.1); }
    .sr-badge {
      flex-shrink: 0; width: 22px; height: 22px; border-radius: 5px;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700;
    }
    .sr-badge.stib    { background: #1a3a8f; color: #93c5fd; }
    .sr-badge.line    { background: #1e3a5f; color: #7dd3fc; }
    .sr-label { flex: 1; font-size: 13px; color: #e2e8f0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .sr-sub   { flex-shrink: 0; font-size: 11px; color: #475569; margin-left: 6px; }
    #searchEmpty { padding: 14px; text-align: center; font-size: 13px; color: #475569; }
  </style>
</head>
<body>
  <div id="map"></div>
  <div id="searchBox">
    <div id="searchInputWrapper">
      <svg id="searchIcon" width="15" height="15" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="9" cy="9" r="7"/><line x1="16" y1="16" x2="13" y2="13"/>
      </svg>
      <input id="searchInput" type="text" placeholder="Arrêt, ligne, feu, caméra…" autocomplete="off" spellcheck="false" />
      <button id="searchClear" style="display:none" title="Effacer">✕</button>
    </div>
    <div id="searchDropdown" style="display:none"></div>
  </div>
  <div id="stibStopHoverTooltip"></div>
  <div id="stibAlertTooltip"></div>
  <div id="chartExpandBackdrop"></div>
  <div id="panel">
    <div id="panelHeader">
      <b>Brussels Traffic Map</b>
      <button id="toggleParamsPanel" class="btn-sm" type="button">Reduce</button>
    </div>
    <div id="panelBody">
      <div class="sectionTitle">Time window</div>
      <div class="row">
        <select id="timeMode">
          <option value="relative">Last X hours</option>
          <option value="range">Time range</option>
        </select>
      </div>
      <div id="relativeRow" class="row">
        <span style="color:#94a3b8;font-size:12px">Hours</span>
        <input id="hours" type="number" min="0.05" step="0.05" value="{{ hours }}" />
      </div>
      <div id="rangeRow" class="row" style="display:none; flex-direction: column; align-items: stretch; gap: 6px;">
        <label style="font-size:12px">Start <input id="startTime" type="datetime-local" style="margin-left:4px" /></label>
        <label style="font-size:12px">End <input id="endTime" type="datetime-local" style="margin-left:4px" /></label>
      </div>
      <div class="row">
        <button id="applyTime" class="btn-primary">Apply</button>
      </div>

      <div class="sectionTitle">Reference period</div>
      <div id="refRelativeRow" class="row" style="flex-direction:column; gap:4px">
        <label style="font-size:12px; display:flex; align-items:center; gap:4px">
          <input type="checkbox" id="refEnabled" />
          Compare J&minus;<input id="refOffsetDays" type="number" min="1" max="365" value="7" style="width:44px; margin:0 2px" /> days
        </label>
      </div>
      <div id="refRangeRow" class="row" style="display:none; flex-direction:column; gap:6px">
        <span style="color:#94a3b8;font-size:11px">Reference (optional — leave blank to disable)</span>
        <label style="font-size:12px">Start <input id="refStartTime" type="datetime-local" style="margin-left:4px" /></label>
        <label style="font-size:12px">End&nbsp;&nbsp; <input id="refEndTime" type="datetime-local" style="margin-left:4px" /></label>
      </div>

      <div class="row"><label><input type="checkbox" id="transportPanelToggle" checked /> <span class="layer-dot" style="background:linear-gradient(90deg,#1e40af 0 33%,#16a34a 33% 66%,#ea580c 66% 100%)"></span> Transport</label></div>
      <div id="status"></div>
    </div>
  </div>

  <!-- Hidden canvas hosts for upstream Chart.js init that LocalRtdatahub
       does not visually expose. Without these, Chart.js throws at module
       load time and halts the rest of the script. -->
  <div style="display:none" aria-hidden="true">
    <canvas id="chart-anpr"></canvas>
    <canvas id="chart-waze-jam"></canvas>
    <canvas id="chart-waze-alert"></canvas>
    <canvas id="chart-brussels"></canvas>
    <canvas id="chart-tomtom-flow"></canvas>
    <canvas id="chart-tomtom-incident"></canvas>
    <canvas id="chart-transport"></canvas>
    <canvas id="chart-traffic-light-capacity"></canvas>
  </div>

  <div id="transportsPanel">
    <div id="transportsHeader">
      <b>Transports</b>
      <button id="toggleTransportsPanel" class="btn-sm" type="button">Reduce</button>
    </div>
    <div id="transportsBody">
      <div id="tpLevelOperators">
        <div class="tp-section-title">Operators</div>
        <div class="tp-op-grid">
          <div class="tp-op-card" data-operator="stib">
            <div class="tp-op-name">STIB</div>
            <div class="tp-op-sub">Brussels</div>
          </div>
          <div class="tp-op-card disabled">
            <div class="tp-op-name">SNCB</div>
            <div class="tp-op-sub">Soon</div>
          </div>
          <div class="tp-op-card disabled">
            <div class="tp-op-name">TEC</div>
            <div class="tp-op-sub">Soon</div>
          </div>
        </div>
      </div>
      <div id="tpLevelStib" style="display:none">
        <div class="tp-stib-header">
          <button class="tp-back-btn" id="tpBackBtn" type="button">← Back</button>
          <b>STIB</b>
        </div>
        <div class="tp-toggles tp-toggles-grid">
          <div class="tp-toggle-wrap">
            <button class="tp-toggle" id="tpToggleSegments" type="button"><span class="tp-toggle-ico">━</span>Segments</button>
            <div class="tp-toggle-slider" id="tpSliderSegments"><input type="range" min="0" max="100" value="100" /><span class="opacity-val">100%</span></div>
          </div>
          <div class="tp-toggle-wrap">
            <button class="tp-toggle" id="tpToggleStops" type="button"><span class="tp-toggle-ico">●</span>Stops</button>
            <div class="tp-toggle-slider" id="tpSliderStops"><input type="range" min="0" max="100" value="100" /><span class="opacity-val">100%</span></div>
          </div>
          <div class="tp-toggle-wrap">
            <button class="tp-toggle" id="tpToggleVehicles" type="button"><span class="tp-toggle-ico">🚌</span>Vehicles <span id="tpVehicleCount" style="opacity:.7;font-weight:500"></span></button>
            <div class="tp-toggle-slider" id="tpSliderVehicles"><input type="range" min="0" max="100" value="100" /><span class="opacity-val">100%</span></div>
          </div>
          <div class="tp-toggle-wrap">
            <button class="tp-toggle tp-toggle-alert" id="tpToggleAlerts" type="button"><span class="tp-toggle-ico">⚠</span>Alerts</button>
            <div class="tp-toggle-slider" id="tpSliderAlerts"><input type="range" min="0" max="100" value="100" /><span class="opacity-val">100%</span></div>
          </div>
        </div>
        <div class="tp-global-opacity" id="tpOpacityGlobal"><label>Global</label><input type="range" min="0" max="100" value="100" /><span class="opacity-val">100%</span></div>
        <div id="tpTemporal" style="display:none">
          <div class="tp-tc-row">
            <button class="tp-tc-btn" id="tpPlayBtn" type="button" title="Play / Pause">▶</button>
            <input type="range" id="tpSlider" min="0" max="1000" value="0" step="1" />
            <span id="tpTimestamp">—</span>
          </div>
          <div class="tp-tc-row tp-speed-row">
            Speed:
            <button class="tp-speed-btn active" data-speed="1"   type="button">×1</button>
            <button class="tp-speed-btn"        data-speed="2"   type="button">×2</button>
            <button class="tp-speed-btn"        data-speed="5"   type="button">×5</button>
            <button class="tp-speed-btn"        data-speed="10"  type="button">×10</button>
            <button class="tp-speed-btn"        data-speed="30"  type="button">×30</button>
          </div>
        </div>
        <div id="tpStibLinesList">
          <div class="tp-empty">Loading lines…</div>
        </div>
        <div id="tpDirectionPicker" class="tp-direction-picker" style="display:none">
          <div class="tp-group-title">Direction</div>
          <div class="tp-direction-chips" id="tpDirectionChips"></div>
        </div>
        <div class="tp-bulk">
          <button id="tpSelectAll" type="button">All</button>
          <button id="tpSelectNone" type="button">None</button>
        </div>
        <div class="tp-legend" id="tpLegend"></div>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <script>
    // ─── LocalRtdatahub: defensive shim ─────────────────────────────────
    // Non-Transport panels were stripped from this HTML, but the upstream
    // JS still references their DOM ids. Return a no-op proxy for those
    // missing ids so the upstream JS keeps running (handlers attached on
    // them simply do nothing).
    (function () {
      const REMOVED_IDS = new Set([
        "trafficLightPanel","trafficLightPanelBody","trafficLightPanelHeader",
        "toggleTrafficLightPanel","selectedFidMeta","selectedTrafficLightMeta",
        "counts","chartTabs","transportChartScroll","transportChartFilter",
        "toggleStatsPanel","statsPanel","statsBody","statsHeader",
        "cfdCompareRow","trChartProx","trChartSlow","trChartStuck","trChartCompare",
        "trafficLightsSelectedFidOnly",
      ]);
      const stubHandler = {
        get(_, prop) {
          if (prop === "classList") return { add(){}, remove(){}, toggle(){return false;}, contains(){return false;} };
          if (prop === "style") return new Proxy({}, { get(){return "";}, set(){return true;} });
          if (prop === "dataset") return {};
          if (prop === "addEventListener" || prop === "removeEventListener") return () => {};
          if (prop === "querySelector") return () => null;
          if (prop === "querySelectorAll") return () => [];
          if (prop === "appendChild" || prop === "removeChild" || prop === "remove") return () => {};
          if (prop === "getContext") return () => null;

    function isoToLocalInput(isoValue) {
      if (!isoValue) return "";
      const d = new Date(isoValue);
      if (Number.isNaN(d.getTime())) return "";
      const pad = (n) => String(n).padStart(2, "0");
      return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
    }

    function localInputToIso(localValue) {
      if (!localValue) return null;
      const d = new Date(localValue);
      if (Number.isNaN(d.getTime())) return null;
      return d.toISOString();
    }

    function currentTimeQuery() {
      if (mode === "range") {
        const startIso = localInputToIso(document.getElementById("startTime").value);
        const endIso = localInputToIso(document.getElementById("endTime").value);
        if (startIso && endIso) {
          return `start=${encodeURIComponent(startIso)}&end=${encodeURIComponent(endIso)}`;
        }
      }
      return `hours=${hours}`;
    }

    function currentRefQuery() {
      if (mode === "range") {
        const refStart = localInputToIso(document.getElementById("refStartTime").value);
        const refEnd = localInputToIso(document.getElementById("refEndTime").value);
        if (refStart && refEnd && new Date(refEnd) > new Date(refStart)) {
          return `&ref_start=${encodeURIComponent(refStart)}&ref_end=${encodeURIComponent(refEnd)}`;
        }
      } else {
        if (document.getElementById("refEnabled").checked) {
          const days = parseInt(document.getElementById("refOffsetDays").value || "7", 10);
          if (days > 0) return `&ref_offset_days=${days}`;
        }
      }
      return "";
    }

          card.__expandOriginParent = card.parentNode;

        document.body.appendChild(card);
      } else if (card.__expandOriginParent) {

          card.__expandOriginParent.insertBefore(card, card.__expandOriginNextSibling);

                      // always have a null in one of the two per bin).
                      filter: (item) => {
                        if (item.parsed.y === null || item.parsed.y === undefined) return false;
                        // Ref bars themselves are represented in the
                        // per-series line via the callback below (with
                        // delta arrow) — don't duplicate them.
                        const lbl = item.dataset.label || "";

                        return true;
                      },
                      callbacks: {
                        // Append ref value + delta for each series when
                        // Compare is active, else just the current value.
                        label: (ctx) => {
                          const seriesName = ctx.dataset.label || "";

                          if (refVal == null) return base;
                          const delta = currentVal - Number(refVal);
                          const sign = delta > 0 ? "+" : (delta < 0 ? "" : "±");
                          const arrow = delta > 0 ? " ↑" : (delta < 0 ? " ↓" : " =");
                          return `${base}  (${_transportRefDisplayLabel}: ${refVal}, ${sign}${delta}${arrow})`;
                        },
                      },
                    }
                  : {})
              }

            scales: {

    function escapeHtml(text) {
      return String(text ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");

    function showTrafficLightInfoPopup(feature, payload) {
      if (!feature || !feature.properties) return;
      const signalgroupId = String(feature.properties.signalgroup_id || "").trim();
      const signalgroupNum = Number.parseInt(feature.properties.signalgroup_num, 10);
      if (!signalgroupId || !Number.isFinite(signalgroupNum)) return;

      const geom = feature.geometry || null;
      if (!geom || geom.type !== "Point" || !Array.isArray(geom.coordinates) || geom.coordinates.length < 2) {
        return;
      }
      const lng = Number(geom.coordinates[0]);
      const lat = Number(geom.coordinates[1]);
      if (!Number.isFinite(lng) || !Number.isFinite(lat)) return;

      const movementSuffix = payload && payload.movement_name ? ` (${payload.movement_name})` : "";
      const cycle = payload && payload.cycle ? payload.cycle : null;
      const cycleText = cycle
        ? `Green ${formatCycleSeconds(cycle.green_seconds)}s | Orange ${formatCycleSeconds(cycle.amber_seconds)}s | Red ${formatCycleSeconds(cycle.red_seconds)}s`
        : "Latest cycle unavailable";

      clearTrafficLightInfoPopup();
      trafficLightInfoPopup = new maplibregl.Popup({
        closeButton: false,
        closeOnClick: false,
        offset: [0, -14],
        maxWidth: "300px",
      })
        .setLngLat([lng, lat])
        .setHTML(
          `<div style="font-size:11px;line-height:1.35;min-width:210px">` +
          `<div style="font-weight:700;color:#f8fafc">${escapeHtml(`${signalgroupId}/${signalgroupNum}${movementSuffix}`)}</div>` +
          `<div style="margin-top:4px;color:#cbd5e1">${escapeHtml(cycleText)}</div>` +
          `</div>`
        )
        .addTo(map);
    }

    function getFeatureFid(feature) {
      const raw = feature && feature.properties ? feature.properties.fid : null;
      const fid = Number.parseInt(raw, 10);
      return Number.isFinite(fid) ? fid : null;
    }

    function applyTrafficLightFidFilter() {
      const baseFeatures = (allTrafficLights && Array.isArray(allTrafficLights.features)) ? allTrafficLights.features : [];
      let overlayFeatures = [];

      };

    function updateTrafficLightCapacityChart(payload) {
      if (!trafficLightCapacityChart) return;
      const rows = payload && Array.isArray(payload.bins) ? payload.bins : [];
      if (!rows.length) {
        clearTrafficLightChart();
        return;
      }

      const laneCount = Number(payload.lane_count || 0);
      const binMinutes = Number(payload.bin_minutes || BIN_MINUTES);
      const labels = rows.map((r) => new Date(r.time_bin).toLocaleTimeString([], {
        hour: "2-digit",
        minute: "2-digit",
        timeZone: "Europe/Brussels",
      }));
      const theoretical = rows.map((r) => {
        const greenSeconds = Number(r.green_seconds ?? NaN);
        if (Number.isFinite(greenSeconds)) {
          return (greenSeconds / 3600.0) * (1800.0 * laneCount);
        }
        return Number(r.theoretical_max_vehicles ?? 0);
      });
      const observed = rows.map((r) => Number(r.observed_vehicles ?? 0));
      const capacity = rows.map((r) => Number(r.capacity_pct ?? 0));

      const datasets = [
        {
          label: `Theoretical max traffic (veh/${binMinutes} min)`,
          data: theoretical,
          borderColor: "#2563eb",
          backgroundColor: "#2563eb",
          yAxisID: "y",
          spanGaps: true,
          tension: 0,
        },
        {
          label: `Observed traffic (veh/${binMinutes} min)`,
          data: observed,
          borderColor: "#f97316",
          backgroundColor: "#f97316",
          yAxisID: "y",
          spanGaps: true,
          tension: 0,
        },
        {
          label: "Light capacity (%)",
          data: capacity,
          borderColor: "#16a34a",
          backgroundColor: "#16a34a",
          borderDash: [6, 4],
          yAxisID: "y1",
          spanGaps: true,
          tension: 0,
        },
      ];

      if (Array.isArray(payload.ref_bins) && payload.ref_bins.length) {
        const refLabel = payload.ref_label || "Référence";
        const refRows = payload.ref_bins;
        const refTheoretical = refRows.map((r) => {
          const gs = Number(r.green_seconds ?? NaN);
          return Number.isFinite(gs) ? (gs / 3600.0) * (1800.0 * laneCount) : Number(r.theoretical_max_vehicles ?? 0);
        });
        const refCapacity = refRows.map((r) => Number(r.capacity_pct ?? 0));
        datasets.push(
          {
            label: `Réf. max traffic – ${refLabel} (veh/${binMinutes} min)`,
            data: refTheoretical,
            borderColor: "#6b7280",
            backgroundColor: "#6b7280",
            yAxisID: "y",
            spanGaps: true,
            tension: 0,
          },
          {
            label: `Réf. capacité – ${refLabel} (%)`,
            data: refCapacity,
            borderColor: "#9ca3af",
            backgroundColor: "#9ca3af",
            borderDash: [6, 4],
            yAxisID: "y1",
            spanGaps: true,
            tension: 0,
          }
        );
      }

      trafficLightCapacityChart.data.labels = labels;
      trafficLightCapacityChart.data.datasets = datasets;
      const sgId = String(payload.signalgroup_id || "");
      const sgNum = Number(payload.signalgroup_num || 0);
      const laneDirection = payload.lane_direction == null ? "all" : String(payload.lane_direction);
      trafficLightCapacityChart.options.scales.y.title.text = `Vehicles per ${binMinutes}-minute bin`;
      trafficLightCapacityChart.options.plugins.title.text = `Traffic light ${sgId}/${sgNum}: Capacity vs Theoretical Max vs Observed (lanes=${laneCount}, direction=${laneDirection})`;
      trafficLightCapacityChart.update();

    function bringInteractiveLayersToFront() {
      // STIB-only build: no extra layers need re-ordering at the front.

    // Transport chart alert-type filter (checkbox pills inside the card).
    const _transportChartFilter = { proximity: true, slow_speed: true, stuck: true };
    let _lastTransportRows = [];
    let _lastTransportRefRows = null;
    let _lastTransportRefLabel = null;
    // Compare toggle: only usable when exactly ONE metric filter is active.
    // Shows a single white ghost bar (ref value) on top of that metric's
    // current bars. Cross-metric comparison is deliberately blocked because
    // three overlaid ref bars + three current bars is unreadable.
    let _transportCompareEnabled = false;
    // Fast lookup populated by updateMetricChart when Compare is active —
    // keyed by {series}{binLabel} → ref value. Read by the tooltip callback
    // to append a "(ref: X, Δ: ±N)" line next to each series in hover.
    let _transportRefLookup = null; // { proximity: {binLabel: v}, slow_speed: {...}, stuck: {...} }
    let _transportRefDisplayLabel = null;

    function _filterTransportRows(rows) {
      if (!Array.isArray(rows)) return rows;
      return rows.filter((r) => _transportChartFilter[r.series] !== false);
    }

    function clearCharts() {
      Object.values(charts).forEach((chart) => {
        chart.data.labels = [];
        chart.data.datasets = [];
        chart.update();
      });
      _lastTransportRows = [];
      _lastTransportRefRows = null;
      _lastTransportRefLabel = null;
    }

    function updateMetricChart(metric, rows, refRows, refLabel) {
      const chart = charts[metric];
      if (!chart) return;
      if (metric === "transport") {
        _lastTransportRows = Array.isArray(rows) ? rows : [];
        _lastTransportRefRows = Array.isArray(refRows) ? refRows : null;
        _lastTransportRefLabel = refLabel || null;
        rows = _filterTransportRows(rows);
        refRows = refRows ? _filterTransportRows(refRows) : refRows;
      }
      if (!rows || !rows.length) {
        chart.data.labels = [];
        chart.data.datasets = [];
        chart.update();
        return;
      }

      const sortedRows = rows
        .filter((r) => r && r.time_bin && r.series != null && r.value != null)
        .sort((a, b) => new Date(a.time_bin) - new Date(b.time_bin));

      // Transport: keep the full time window on the x-axis, regardless of
      // which metric filters are active, so the chart does not collapse
      // into two lone bars when a sparse metric (stuck) is displayed
      // alone. Labels come from the UNFILTERED current + ref rows (ie.
      // every bin that has ANY metric in the window), then we map the
      // filtered datasets onto those labels (missing metric → 0 / null).
      let rowsForLabels;
      if (metric === "transport") {
        const base = Array.isArray(_lastTransportRows) ? _lastTransportRows : [];
        const ref = Array.isArray(_lastTransportRefRows) ? _lastTransportRefRows : [];
        rowsForLabels = base.concat(ref).filter((r) => r && r.time_bin);
      } else {
        rowsForLabels = sortedRows;
      }
      const labels = Array.from(new Set(rowsForLabels.map((r) => new Date(r.time_bin).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" }))))
        .sort(); // chronological (labels are "HH:MM" within the same day)
      const totalsBySeries = {};
      sortedRows.forEach((r) => {
        totalsBySeries[r.series] = (totalsBySeries[r.series] || 0) + Number(r.value || 0);
      });

      // Transport: keep the 3 known series with a fixed draw order (largest
      // first → on top, smallest first → in front). Other metrics keep the
      // existing "top-N by total value" behaviour.
      // Colors are tuned for visibility when overlaid:
      //   slow_speed : most transparent (usually the tallest, acts as background)
      //   proximity  : medium opacity
      //   stuck      : most opaque (rare, must stay visible in front)
      const TRANSPORT_SERIES_STYLE = {
        slow_speed: { color: "rgb(251,146,60)",  bg: "rgba(251,146,60,0.45)" },
        proximity:  { color: "rgb(239,68,68)",   bg: "rgba(239,68,68,0.65)"  },
        stuck:      { color: "rgb(147,51,234)",  bg: "rgba(147,51,234,0.85)" },
      };
      const isTransport = metric === "transport";
      const keptSeries = isTransport
        ? ["slow_speed", "proximity", "stuck"].filter((s) => totalsBySeries[s])
        : Object.entries(totalsBySeries)
            .sort((a, b) => b[1] - a[1])
            .slice(0, TOP_SERIES)
            .map(([series]) => series);

      const datasets = keptSeries.map((series, idx) => {
        const valuesByLabel = {};
        sortedRows.forEach((r) => {
          if (r.series !== series) return;
          const label = new Date(r.time_bin).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
          valuesByLabel[label] = Number(r.value || 0);
        });
        if (isTransport) {
          const style = TRANSPORT_SERIES_STYLE[series] || {
            color: "rgb(148,163,184)", bg: "rgba(148,163,184,0.5)"
          };
          return {
            label: String(series),
            data: labels.map((label) => valuesByLabel[label] ?? 0),
            backgroundColor: style.bg,
            borderColor: style.color,
            borderWidth: 1,
            // The key trick for overlay: grouped=false → all bars share the
            // same x slot instead of being placed side-by-side.
            grouped: false,
            categoryPercentage: 0.9,
            barPercentage: 1.0,
            // Chart.js draws datasets in array order; `order` overrides that.
            // stuck (smallest) should be drawn LAST (front), slow_speed FIRST (back).
            order: series === "slow_speed" ? 3 : series === "proximity" ? 2 : 1,
          };
        }
        const c = colorForSeries(idx);
        return {
          label: String(series),
          data: labels.map((label) => valuesByLabel[label] ?? null),
          borderColor: c,
          backgroundColor: c + "18",
          fill: keptSeries.length <= 2,
          spanGaps: true,
          tension: 0.3
        };
      });

      if (Array.isArray(refRows) && refRows.length) {
        const sortedRefRows = refRows
          .filter((r) => r && r.time_bin && r.series != null && r.value != null)
          .sort((a, b) => new Date(a.time_bin) - new Date(b.time_bin));
        const rLabel = refLabel || "Référence";
        if (isTransport) {
          // Compare is gated: ref bar renders ONLY when Compare is ON
          // AND exactly one metric filter is active. We render side-by-
          // side grouped bars (industry standard for period comparison)
          // so there is zero overlap and no z-order ambiguity:
          //   [current] [ref]   [current] [ref]   …
          // Ref colour = same hue as current but desaturated (Tailwind
          // *-300 of each metric) so the relationship reads as "same
          // metric, lighter shade = past period".
          const activeMetrics = keptSeries.filter((s) => _transportChartFilter[s] !== false);
          if (_transportCompareEnabled && activeMetrics.length === 1) {
            const series = activeMetrics[0];
            _transportRefLookup = {};
            _transportRefLookup[series] = {};
            _transportRefDisplayLabel = rLabel;
            const valuesByLabel = {};
            sortedRefRows.forEach((r) => {
              if (r.series !== series) return;
              const lb = new Date(r.time_bin).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
              valuesByLabel[lb] = Number(r.value || 0);
              _transportRefLookup[series][lb] = Number(r.value || 0);
            });

            // Solid (fully opaque) colour for the current bar in Compare
            // mode — no overlap with ref now, so any previous alpha
            // softening is unnecessary.
            const SOLID = {
              proximity:  "rgb(239,68,68)",
              slow_speed: "rgb(251,146,60)",
              stuck:      "rgb(147,51,234)",
            };
            // Desaturated (Tailwind *-300) shade of each metric for the
            // ref bar — same hue family but visibly lighter.
            const REF_PASTEL = {
              proximity:  "rgb(252,165,165)",   // red-300
              slow_speed: "rgb(253,186,116)",   // orange-300
              stuck:      "rgb(216,180,254)",   // purple-300
            };

            // Switch the current bar from overlay (grouped:false) to
            // grouped layout so it sits beside the ref bar instead of
            // sharing the same x slot.
            //
            // Spacing strategy: tight within a pair (current+ref read
            // as one comparison unit), wide between pairs (bins are
            // visually distinct). Achieved with:
            //   categoryPercentage = 0.7  → group uses 70% of bin slot
            //                                → 30% empty gap between bins
            //   barPercentage      = 0.95 → each bar is 95% of its sub-
            //                                slot → only ~1.75% gap inside
            //                                each pair.
            const currentDs = datasets.find((d) => d.label === String(series));
            if (currentDs) {
              currentDs.backgroundColor = SOLID[series] || currentDs.backgroundColor;
              currentDs.grouped = true;
              currentDs.categoryPercentage = 0.7;
              currentDs.barPercentage = 0.95;
            }

            datasets.push({
              label: `Réf. ${String(series)} – ${rLabel}`,
              data: labels.map((lb) => valuesByLabel[lb] ?? 0),
              backgroundColor: REF_PASTEL[series] || "rgb(203,213,225)",
              borderWidth: 0,
              borderSkipped: false,
              grouped: true,
              categoryPercentage: 0.7,
              barPercentage: 0.95,
              // Grouped layout : Chart.js places bars left-to-right by
              // ascending `order`. Current metric uses order 1/2/3 (set
              // in the keptSeries loop above), so giving ref a higher
              // order pushes it to the RIGHT of the current bar.
              order: 10,
            });
          } else {
            _transportRefLookup = null;
            _transportRefDisplayLabel = null;
          }
        } else {
          keptSeries.forEach((series, idx) => {
            const valuesByLabel = {};
            sortedRefRows.forEach((r) => {
              if (r.series !== series) return;
              const label = new Date(r.time_bin).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
              valuesByLabel[label] = Number(r.value || 0);
            });
            const c = colorForSeries(idx);
            datasets.push({
              label: `Réf. ${String(series)} – ${rLabel}`,
              data: labels.map((label) => valuesByLabel[label] ?? null),
              borderColor: c,
              backgroundColor: c + "10",
              borderDash: [6, 4],
              fill: false,
              spanGaps: true,
              tension: 0.3,
            });
          });
        }
      } else if (isTransport) {
        // No ref data — clear any previous stashed lookup so the tooltip
        // does not show stale comparison info.
        _transportRefLookup = null;
        _transportRefDisplayLabel = null;
      }

      chart.data.labels = labels;
      chart.data.datasets = datasets;

      // Transport: size the canvas wrapper so each bin keeps a usable
      // width (and the chart scrolls horizontally when there are many).
      // pxPerBin is wider in Compare mode (2 bars per bin = needs more
      // room) than in normal overlay (1 visible bar slot per bin).
      if (metric === "transport") {
        const inner = document.querySelector("#transportChartScroll .chart-scroll-inner");
        if (inner) {
          const isCompare = _transportCompareEnabled
            && Object.values(_transportChartFilter).filter(Boolean).length === 1;
          const pxPerBin = isCompare ? 56 : 28;
          const containerWidth = inner.parentElement
            ? inner.parentElement.clientWidth
            : 0;
          const targetWidth = Math.max(containerWidth, labels.length * pxPerBin);
          inner.style.minWidth = targetWidth + "px";
        }
      }

      chart.update();
      // Force Chart.js to honour the new wrapper size.
      if (metric === "transport") chart.resize();
    }

    // Transport chart alert-type pills — toggle series in the chart without refetching.
    // Sync the Compare row's enabled/disabled state with the current
    // number of active metric filters. Called after every filter change
    // and also once at boot (so the initial "3 active → disabled" state
    // is correct even before the user clicks anything).
    function _syncTransportCompareState() {
      const active = Object.values(_transportChartFilter).filter(Boolean).length;
      const canCompare = active === 1;
      const row = document.getElementById("cfdCompareRow");
      const cb = document.getElementById("trChartCompare");
      if (!row || !cb) return;

        cb.disabled = true;
        if (cb.checked) {

          cb.checked = false;
          _transportCompareEnabled = false;
        }
      }
    }

    document.getElementById("transportChartFilter").addEventListener("change", async (ev) => {
      const id = ev.target.id;
      // Dedicated branch for the Compare checkbox (different from the 3
      // metric filters).
      if (id === "trChartCompare") {
        _transportCompareEnabled = !!ev.target.checked;
        // If the user enables chart-Compare but no ref data has been
        // fetched yet (because the app-level "Compare J−X days" toggle
        // is off), do a one-shot fetch for transport so the comparison
        // can render immediately. Defaults to J−7 — same default as the
        // app-level offset input.
        // (Geolink fid stats endpoint removed in STIB-only build.)
        updateMetricChart("transport", _lastTransportRows, _lastTransportRefRows, _lastTransportRefLabel);
        return;
      }
      const map_ = { trChartProx: "proximity", trChartSlow: "slow_speed", trChartStuck: "stuck" };
      const key = map_[id];
      if (!key) return;
      _transportChartFilter[key] = !!ev.target.checked;
      // Visually dim the row when unchecked (kept in sync with the filter state).
      const row = ev.target.closest(".cfd-row");
      if (row) row.classList.toggle("off", !ev.target.checked);
      _syncTransportCompareState();
      updateMetricChart("transport", _lastTransportRows, _lastTransportRefRows, _lastTransportRefLabel);

          url.searchParams.delete("ref_offset_days");
